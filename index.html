<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copa do Mundo 2026 — Chave Oficial</title>
<style>
  :root {
    --bg: #0b0b0c;
    --panel: rgba(21, 21, 23, 0.6);
    --grey: #3c3c40;
    --gold: #d9a531;
    --text: #e9e6df;
    --muted: #8a8a8f;
    --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 12px 16px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--muted);
  }

  #livePanel {
    max-width: 880px;
    margin: 12px auto;
    padding: 12px 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    font-size: 13px;
    transition: grid-template-columns 0.2s;
  }
  #livePanel.no-live {
    grid-template-columns: 1fr;
  }
  #livePanel.no-live .live-match {
    display: none;
  }
  #livePanel.no-live .next-match {
    justify-content: center;
  }
  #livePanel .live-match {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #livePanel .live-badge {
    color: #ff3b30;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #livePanel .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  #livePanel .match-teams img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .match-score {
    font-weight: 700;
    font-size: 18px;
    color: var(--gold);
    padding: 0 8px;
  }
  #livePanel .match-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .next-match {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  #livePanel .next-badge {
    color: var(--gold);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #livePanel .next-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #livePanel .next-info .teams {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #livePanel .next-info img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .next-info .date-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .status-badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-live { background: #ff3b30; color: #fff; }
  .status-finished { background: #34c759; color: #fff; }
  .status-upcoming { background: #ff9500; color: #fff; }

  #wrap {
    width: min(94vw, 880px);
    margin: 0 auto;
    position: relative;
  }
  #stage {
    width: 100%;
    height: auto;
    display: block;
  }

  .node-img {
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
  }
  .node-img.pending {
    opacity: 0.32;
  }
  .node-img.champion {
    animation: championGlow 2s ease-in-out infinite;
  }
  @keyframes championGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(217,165,49,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(217,165,49,0.9)); }
  }

  .conf-badge {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.75));
    pointer-events: none;
  }

  .ring-label {
    fill: var(--muted);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tooltip-modern {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 23, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 180px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .tooltip-modern.visible { opacity: 1; }
  .tooltip-modern.pinned { pointer-events: auto; }
  .tooltip-modern .tt-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .tooltip-modern .tt-header img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 50%;
  }
  .tooltip-modern .tt-vs {
    color: var(--muted);
    font-weight: 400;
    padding: 0 4px;
  }
  .tooltip-modern .tt-score {
    color: var(--gold);
    font-weight: 700;
    font-size: 18px;
    margin: 4px 0;
  }
  .tooltip-modern .tt-details {
    color: var(--muted);
    font-size: 11px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .tooltip-modern .tt-details span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-close {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    padding: 0 4px;
  }
  .tooltip-modern .tt-close:hover { color: var(--gold); }
  .tooltip-modern .tt-loading {
    color: var(--muted);
    font-size: 12px;
  }
  .tooltip-modern .tt-info-row {
    font-size: 12px;
    margin-top: 4px;
    line-height: 1.5;
  }
  .tooltip-modern .tt-info-row strong {
    color: var(--text);
  }
  .tooltip-modern .tt-scorer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .tooltip-modern .tt-scorer-photo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.1);
    background: #1c1c1f;
    flex-shrink: 0;
  }
  .tooltip-modern .tt-upcoming {
    text-align: center;
  }
  .tooltip-modern .tt-upcoming .tt-badge {
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .tooltip-modern .tt-upcoming .tt-teams {
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    margin: 8px 0;
    letter-spacing: 0.02em;
  }
  .tooltip-modern .tt-upcoming .tt-teams strong {
    color: var(--gold);
    font-weight: 700;
    padding: 0 6px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 6px 0 4px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-upcoming .tt-stage {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .tooltip-modern .tt-live-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
    margin-right: 4px;
  }

  #status {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 10px 0 28px;
  }
  #status button {
    background: none;
    border: 1px solid var(--grey);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 12px;
    margin-left: 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  #status button:hover { border-color: var(--gold); color: var(--gold); }
  .err {
    max-width: 560px;
    margin: 20px auto;
    padding: 14px 18px;
    border: 1px solid #5b2a2a;
    background: #1c1010;
    border-radius: 8px;
    font-size: 13px;
    color: #f3b7b7;
  }

  @media (max-width: 640px) {
    #livePanel {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px 14px;
      font-size: 12px;
    }
    #livePanel .next-match {
      justify-content: flex-start;
    }
    #livePanel .match-score {
      font-size: 16px;
    }
    .tooltip-modern {
      min-width: 150px;
      padding: 10px 12px;
    }
    .tooltip-modern .tt-upcoming .tt-teams {
      font-size: 15px;
    }
    .tooltip-modern .tt-upcoming .tt-datetime {
      font-size: 11px;
      gap: 8px;
    }
    .tooltip-modern .tt-header {
      font-size: 12px;
    }
    .tooltip-modern .tt-header img {
      width: 22px;
      height: 22px;
    }
    .tooltip-modern .tt-score {
      font-size: 16px;
    }
  }

    // ============================================
    function getConfederation(code) {
      if (!code) return null;
      return CONFEDERATIONS[code.toUpperCase()] || null;
    }

    function el(tag, attrs) {
      const n = document.createElementNS(NS, tag);
      for (const k in attrs) n.setAttribute(k, attrs[k]);
      return n;
    }

    function polar(r, angleDeg) {
      const a = ((angleDeg - 90) * Math.PI) / 180;
      return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
    }

    function normalizeAngle(a) {
      a = a % 360;
      if (a < 0) a += 360;
      return a;
    }

    function shortestAngleDiff(a, b) {
      let diff = normalizeAngle(b - a);
      if (diff > 180) diff -= 360;
      return diff;
    }

    function calculateMidAngle(angleA, angleB) {
      const diff = shortestAngleDiff(angleA, angleB);
      return normalizeAngle(angleA + diff / 2);
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    // ============================================
    // PROCESSAMENTO DE DADOS
    // ============================================
    function processRounds(data) {
      if (!data || !data.rounds) {
        console.warn('⚠️ Dados inválidos ou sem rounds');
        return [];
      }
      
      const rounds = data.rounds.filter(r => r.matches && r.matches.length > 0);
      
      if (rounds.length === 0) {
        console.warn('⚠️ Nenhuma fase com partidas encontrada');
        return [];
      }
      
      console.log('📊 Fases encontradas:', rounds.map(r => ({
        key: r.key,
        label: r.label,
        matches: r.matches.length
      })));
      
      return rounds;
    }

    // ============================================
    // FUNÇÕES DE DESENHO
    // ============================================
    function drawBackground() {
      const defs = el("defs", {});
      
      const grad = el("radialGradient", { id: "bgGlow", cx: "50%", cy: "50%", r: "50%" });
      grad.appendChild(el("stop", { offset: "0%", "stop-color": "#3a2c0c", "stop-opacity": "0.6" }));
      grad.appendChild(el("stop", { offset: "30%", "stop-color": "#1c1508", "stop-opacity": "0.4" }));
      grad.appendChild(el("stop", { offset: "100%", "stop-color": "#0b0b0c", "stop-opacity": "1" }));
      defs.appendChild(grad);

      for (let i = 0; i < GLOW_AMOUNT.length; i++) {
        const filter = el("filter", { 
          id: `glow-${i}`, 
          x: "-60%", y: "-60%", width: "220%", height: "220%" 
        });
        filter.appendChild(el("feGaussianBlur", { stdDeviation: GLOW_AMOUNT[i], result: "blur" }));
        const merge = el("feMerge", {});
        merge.appendChild(el("feMergeNode", { in: "blur" }));
        merge.appendChild(el("feMergeNode", { in: "SourceGraphic" }));
        filter.appendChild(merge);
        defs.appendChild(filter);
      }

      svg.appendChild(defs);
      svg.appendChild(el("rect", { x: 0, y: 0, width: 1000, height: 1000, fill: "url(#bgGlow)" }));

      LEVEL_R.forEach((r) => {
        svg.appendChild(
          el("circle", { cx: CX, cy: CY, r, fill: "none", stroke: "#1c1c1f", "stroke-width": 0.5 })
        );
      });
    }

    function drawTrophy() {
      const g = el("g", {});
      g.appendChild(
        el("circle", { cx: CX, cy: CY, r: 62, fill: "#0b0b0c", stroke: "#3a2c0c", "stroke-width": 2 })
      );
      const size = 76;
      g.appendChild(
        el("image", {
          x: CX - size / 2,

    }

    function drawConnector(rOuter, angleA, angleB, rMid, childAngle, rInner, color, glowLevel, lineWidth) {
      const g = el("g", {
        fill: "none",
        stroke: color,
        "stroke-width": lineWidth || 1.6,
        "stroke-linecap": "round",
        "stroke-linejoin": "round",
        opacity: glowLevel > 0 ? 1 : 0.45,
      });
      
      if (glowLevel > 0) {
        const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
        g.setAttribute("filter", `url(#glow-${idx})`);
      }

      const [x1, y1] = polar(rOuter, angleA);
      const [x2, y2] = polar(rOuter, angleB);
      const [mx1, my1] = polar(rMid, angleA);
      const [mx2, my2] = polar(rMid, angleB);
      const [cx2, cy2] = polar(rInner, childAngle);
      const [cmx, cmy] = polar(rMid, childAngle);

      const diff = shortestAngleDiff(angleA, angleB);
      const large = Math.abs(diff) > 180 ? 1 : 0;
      const sweep = diff >= 0 ? 1 : 0;

      const d = 
        `M${x1},${y1} ` +
        `L${mx1},${my1} ` +
        `A${rMid},${rMid} 0 ${large} ${sweep} ${mx2},${my2} ` +
        `L${x2},${y2} ` +
        `M${cmx},${cmy} ` +
        `L${cx2},${cy2}`;

      g.appendChild(el("path", { d }));
      svg.appendChild(g);
    }

    function teamNode(team, r, angle, branchColor, pending, size, glowLevel, isChampion) {
      const [x, y] = polar(r, angle);
      const g = el("g", { 
        class: "node", 
        "data-x": x, 
        "data-y": y,
        style: `--size: ${size}px`
      });

      const clipId = "clip-" + Math.random().toString(36).slice(2);
      const defs = el("defs", {});
      const clip = el("clipPath", { id: clipId });
      clip.appendChild(el("circle", { cx: x, cy: y, r: size / 2 }));
      defs.appendChild(clip);
      g.appendChild(defs);

      const ring = el("circle", {
        cx: x, cy: y, r: size / 2 + 2.5,
        fill: pending ? "#101012" : "#151517",
        stroke: pending ? GREY : (isChampion ? "#d9a531" : branchColor),
        "stroke-width": isChampion ? 3 : (pending ? 1.4 : 2.2),
      });
      
      if (glowLevel > 0 && !pending) {
        const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
        ring.setAttribute("filter", `url(#glow-${idx})`);
      }
      
      if (isChampion) {
        ring.setAttribute("stroke", "#d9a531");
        ring.setAttribute("stroke-width", "3");
        const anim = el("animate", {
          attributeName: "r",
          values: `${size/2 + 2.5};${size/2 + 5};${size/2 + 2.5}`,
          dur: "2s",
          repeatCount: "indefinite"
        });
        ring.appendChild(anim);
      }
      g.appendChild(ring);

      if (team && team.logo) {
        const img = el("image", {
          x: x - size / 2, y: y - size / 2, width: size, height: size,
          href: team.logo, 
          "clip-path": `url(#${clipId})`,
          class: `node-img${pending ? " pending" : ""}${isChampion ? " champion" : ""}`,
          preserveAspectRatio: "xMidYMid slice",
        });
        g.appendChild(img);
      } else {
        g.appendChild(el("circle", { cx: x, cy: y, r: size / 2 - 4, fill: "#222226" }));
      }

      // Confederação
      if (!pending && team && team.code) {
        const conf = getConfederation(team.code);
        if (conf) {
          const badgeSize = Math.max(16, Math.round(size * 0.55));
          const angleRad = Math.atan2(y - CY, x - CX);
          const offset = size / 2 + badgeSize / 2 + 6;
          const bx = x + Math.cos(angleRad) * offset;
          const by = y + Math.sin(angleRad) * offset;
          
          const confPath = `/assets/img/federations/${team.code}.svg`;
          
          const bgCircle = el("circle", {
            cx: bx,
            cy: by,
            r: badgeSize / 2 + 2,
            fill: "#0b0b0c",
            stroke: "rgba(255,255,255,0.1)",
            "stroke-width": 1
          });
          g.appendChild(bgCircle);
          
          g.appendChild(el("image", {
            x: bx - badgeSize / 2,
            y: by - badgeSize / 2,
            width: badgeSize,
            height: badgeSize,
            href: confPath,
            class: "conf-badge",
            preserveAspectRatio: "xMidYMid meet",
            onerror: "this.style.display='none'"
          }));
        }
      }

      // Eventos
      if (team && team.name) {
        g.addEventListener("mouseenter", (ev) => {
          if (tooltip.classList.contains("pinned")) return;
          showTooltip(ev, team);
        });
        g.addEventListener("mousemove", (ev) => {
          if (tooltip.classList.contains("pinned")) return;
          tooltip.style.left = (ev.clientX + 16) + "px";
          tooltip.style.top = (ev.clientY + 16) + "px";
        });
        g.addEventListener("mouseleave", () => {
          if (tooltip.classList.contains("pinned")) return;
          tooltip.classList.remove("visible");
        });
        if (team.id && !pending) {
          g.style.cursor = "pointer";
          g.addEventListener("click", (ev) => {
            ev.stopPropagation();
            showTeamDetails(ev, team);
          });
        }
      }

      svg.appendChild(g);
      allNodeGroups.push(g);
      return g;
    }

    // ============================================
    // LIVE PANEL
    // ============================================
    function updateLivePanel(data) {
      const matches = [];
      if (data.rounds) {
        for (const round of data.rounds) {
          for (const m of round.matches) {
            matches.push(m);
          }
        }
      }

      const now = new Date();
      let liveMatch = null;
      let nextMatch = null;
      let earliestFuture = null;

      for (const m of matches) {
        const matchDate = new Date(m.date);
        const status = m.status || 'SCHEDULED';
        
        if (status === 'IN_PLAY' || status === 'LIVE' || status === 'PAUSED') {
          if (!liveMatch) liveMatch = m;
        } else if (status === 'FINISHED') {
          continue;
        } else {
          if (matchDate > now) {
            if (!earliestFuture || matchDate < earliestFuture.date) {
              earliestFuture = { match: m, date: matchDate };
            }
          }
        }
      }

      if (!liveMatch && earliestFuture) {
        nextMatch = earliestFuture.match;
      } else if (liveMatch) {
        for (const m of matches) {
          const matchDate = new Date(m.date);
          if (matchDate > new Date(liveMatch.date)) {
            if (!nextMatch || matchDate < new Date(nextMatch.date)) {
              nextMatch = m;
            }
          }
        }
      }

      livePanel.classList.toggle("no-live", !liveMatch);

      if (liveMatch) {
        const home = liveMatch.home;
        const away = liveMatch.away;
        const score = liveMatch.score;
        const homeScore = score?.home ?? '—';
        const awayScore = score?.away ?? '—';
        const status = liveMatch.status || 'SCHEDULED';
        
        document.getElementById('liveHome').textContent = home.name || '—';
        document.getElementById('liveAway').textContent = away.name || '—';
        document.getElementById('liveScore').textContent = `${homeScore} × ${awayScore}`;
        document.getElementById('liveTime').textContent = `• ${new Date(liveMatch.date).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
        document.getElementById('liveStatus').textContent = STATUS_LABELS[status] || status;
        document.getElementById('liveStatus').className = `status-badge status-${status === 'FINISHED' ? 'finished' : (status === 'IN_PLAY' || status === 'LIVE' ? 'live' : 'upcoming')}`;
        
        const homeImg = document.querySelector('#liveTeams img:first-child');
        const awayImg = document.querySelector('#liveTeams img:last-child');
        if (homeImg) homeImg.src = home.logo || '';
        if (awayImg) awayImg.src = away.logo || '';
        document.querySelector('.live-badge').textContent = status === 'FINISHED' ? '✓ ENCERRADO' : '● AO VIVO';
      }

      if (nextMatch) {
        const home = nextMatch.home;
        const away = nextMatch.away;
        const date = new Date(nextMatch.date);
        document.querySelector('.next-match').style.opacity = '1';
        document.getElementById('nextHome').textContent = home.name || '—';
        document.getElementById('nextAway').textContent = away.name || '—';
        document.getElementById('nextDateTime').textContent = 
          `📅 ${date.toLocaleDateString('pt-BR')} • 🕘 ${date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
        const homeImg = document.querySelector('#nextTeams img:first-child');
        const awayImg = document.querySelector('#nextTeams img:last-child');
        if (homeImg) homeImg.src = home.logo || '';
        if (awayImg) awayImg.src = away.logo || '';
      } else {
        document.querySelector('.next-match').style.opacity = '0.5';
        document.getElementById('nextHome').textContent = '—';
        document.getElementById('nextAway').textContent = '—';
        document.getElementById('nextDateTime').textContent = '📅 --/-- • 🕘 --:--';
      }
    }

    // ============================================
// RENDERIZAÇÃO PRINCIPAL (CORRIGIDA)
// ============================================
function render(data) {
  clear(svg);
  allNodeGroups = [];
  drawBackground();

  const rounds = processRounds(data);
  if (rounds.length === 0) {
    statusEl.innerHTML = `⚠️ Nenhum jogo do mata-mata encontrado.`;
    return;
  }

  let previousNodes = [];

  for (let ri = 0; ri < rounds.length; ri++) {
    const round = rounds[ri];
    const matches = round.matches || [];
    const isFirstRound = (ri === 0);
    const r = LEVEL_R[ri] || LEVEL_R[LEVEL_R.length - 1];
    const sizeIdx = Math.min(ri, NODE_SIZE.length - 1);
    const size = NODE_SIZE[sizeIdx];

    if (isFirstRound) {
      // ---------- PRIMEIRA FASE: distribuição uniforme (0 a 360) ----------
      const totalMatches = matches.length;
      const nodes = [];

      matches.forEach((match, idx) => {
        // Cada match ocupa um setor de 360/totalMatches graus
        const sectorAngle = 360 / totalMatches;
        const baseAngle = idx * sectorAngle; // ângulo central do setor
        const branchIdx = Math.floor(idx / (totalMatches / 8)) % 8;

        // --- Time da casa ---
        const homeAngle = normalizeAngle(baseAngle - sectorAngle * 0.2);
        let homeTeam = match.home;
        if (!homeTeam || homeTeam.name === 'TBD') {
          homeTeam = { name: 'TBD', logo: null, id: null, code: null };
        }
        homeTeam._matchData = {
          opponent: match.away,
          homeName: homeTeam.name,
          awayName: match.away?.name || '—',
          score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
          stage: round.label,
          date: new Date(match.date).toLocaleDateString('pt-BR'),
          time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          status: match.status || 'SCHEDULED',
          isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
          isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
          isFinished: match.status === 'FINISHED',
          statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
        };
        const pendingHome = !homeTeam.id || homeTeam.name === 'TBD';
        teamNode(homeTeam, r, homeAngle, pendingHome ? GREY : BRANCH_COLORS[branchIdx], pendingHome, size, 0, false);
        nodes.push({ team: homeTeam, angle: homeAngle, branchIdx });

        // --- Time visitante ---
        const awayAngle = normalizeAngle(baseAngle + sectorAngle * 0.2);
        let awayTeam = match.away;
        if (!awayTeam || awayTeam.name === 'TBD') {
          awayTeam = { name: 'TBD', logo: null, id: null, code: null };
        }
        awayTeam._matchData = {
          opponent: match.home,
          homeName: match.home?.name || '—',
          awayName: awayTeam.name,
          score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
          stage: round.label,
          date: new Date(match.date).toLocaleDateString('pt-BR'),
          time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          status: match.status || 'SCHEDULED',
          isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
          isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
          isFinished: match.status === 'FINISHED',
          statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
        };
        const pendingAway = !awayTeam.id || awayTeam.name === 'TBD';
        teamNode(awayTeam, r, awayAngle, pendingAway ? GREY : BRANCH_COLORS[branchIdx], pendingAway, size, 0, false);
        nodes.push({ team: awayTeam, angle: awayAngle, branchIdx });
      });

      previousNodes = nodes;
      console.log(`📌 Fase ${ri} (${round.key}) criou ${nodes.length} nós com distribuição uniforme`);

    } else {
      // ---------- FASES SEGUINTES: matching por ID (usando fixtureId) ----------
      const currentNodes = [];

      matches.forEach((match) => {
        // CORREÇÃO: usar fixtureId em vez de id (que é undefined)
        const matchId = match.fixtureId || match.id;

        // Procurar os pais pelo ID do time (não pela posição)
        const homeParent = previousNodes.find(n => n.team.id === match.home?.id);
        const awayParent = previousNodes.find(n => n.team.id === match.away?.id);

        if (!homeParent || !awayParent) {
          console.warn(`⚠️ Pais não encontrados para match ${matchId}`, match);
          return;
        }

        const childAngle = calculateMidAngle(homeParent.angle, awayParent.angle);

        // Determinar vencedor
        let winnerTeam = null;
        let decided = false;
        if (match.winnerId) {
          decided = true;
          winnerTeam = (match.home?.id === match.winnerId) ? match.home : match.away;
        } else if (match.status === 'FINISHED' && match.score) {
          const homeScore = match.score?.home || 0;
          const awayScore = match.score?.away || 0;
          if (homeScore > awayScore) { decided = true; winnerTeam = match.home; }
          else if (awayScore > homeScore) { decided = true; winnerTeam = match.away; }
          else if (match.score?.penalties) {
            const penHome = match.score.penalties?.home || 0;
            const penAway = match.score.penalties?.away || 0;
            if (penHome > penAway) { decided = true; winnerTeam = match.home; }
            else if (penAway > penHome) { decided = true; winnerTeam = match.away; }
          }
        }

        const branchIdx = decided ?
          (winnerTeam?.id === match.home?.id ? homeParent.branchIdx : awayParent.branchIdx) :
          homeParent.branchIdx;
        const color = decided ? BRANCH_COLORS[branchIdx] : GREY;

        const rMid = (LEVEL_R[ri-1] + LEVEL_R[ri]) / 2;
        const glowLevel = Math.min(ri, GLOW_AMOUNT.length - 1);
        const lineWidth = Math.min(ri + 1, LINE_WIDTH.length - 1);

        drawConnector(
          LEVEL_R[ri-1],
          homeParent.angle,
          awayParent.angle,
          rMid,
          childAngle,
          LEVEL_R[ri],
          color,
          glowLevel,
          lineWidth
        );

        const teamObj = winnerTeam || {
          name: 'TBD',
          logo: null,
          id: null,
          code: null,
          _matchData: {
            opponent: null,
            homeName: match.home?.name || '—',
            awayName: match.away?.name || '—',
            score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
            stage: round.label || `Fase ${ri + 1}`,
            date: new Date(match.date).toLocaleDateString('pt-BR'),
            time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
            status: match.status || 'SCHEDULED',
            isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
            isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
            isFinished: match.status === 'FINISHED',
            statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
          }
        };
        if (winnerTeam) {
          teamObj._matchData.opponent = (match.home?.id === winnerTeam.id) ? match.away : match.home;
        }

        const isChampion = (ri === rounds.length - 1) && decided && matches.length === 1;
        teamNode(
          teamObj,
          LEVEL_R[ri],
          childAngle,
          decided ? BRANCH_COLORS[branchIdx] : GREY,
          !decided,
          size,
          decided ? glowLevel : 0,
          isChampion
        );

        currentNodes.push({
          team: teamObj,
          angle: childAngle,
          branchIdx: branchIdx,
          decided: decided
        });
      });

      previousNodes = currentNodes;
    }
  }

  drawTrophy();
  updateLivePanel(data);

  const ts = new Date(data.updatedAt).toLocaleString("pt-BR");
  statusEl.innerHTML = `Atualizado em ${ts} <button id="refreshBtn">Atualizar agora</button>`;
  document.getElementById("refreshBtn")?.addEventListener("click", load);
}
    // ============================================
    // LOAD E ATUALIZAÇÃO
    // ============================================
    async function load() {
      statusEl.textContent = "Atualizando…";
      try {
        // Tenta buscar da API real
        const res = await fetch("/api/bracket", { cache: "no-store" });
        
        if (res.ok) {
          const data = await res.json();
          if (data.rounds && data.rounds.length > 0) {
            currentData = data;
            render(data);
            return;
          }
        }
        
        // Fallback para dados mock se a API não retornar dados
        console.warn('⚠️ Usando dados mock para demonstração');
        const mockData = getMockData();
        currentData = mockData;
        render(mockData);
        statusEl.innerHTML = `📊 Dados de demonstração (mock) - ${new Date().toISOString()}`;
        
      } catch (err) {
        console.error('Erro ao carregar:', err);
        // Usar mock em caso de erro
        const mockData = getMockData();
        currentData = mockData;
        render(mockData);
        statusEl.innerHTML = `📊 Dados de demonstração (mock) - ${new Date().toISOString()}`;
      }
    }

    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    document.getElementById("refreshBtn")?.addEventListener("click", load);
    load();
    setInterval(load, POLL_MS);
  </script>
</body>
</html>
