<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copa do Mundo 2026 — Chave Automática</title>
<style>
  :root {
    --bg: #0b0b0c;
    --panel: rgba(21, 21, 23, 0.6);
    --grey: #3c3c40;
    --gold: #d9a531;
    --text: #e9e6df;
    --muted: #8a8a8f;
    --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* Header com efeito vidro */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 12px 16px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--muted);
  }

  /* Painel de informações ao vivo */
  #livePanel {
    max-width: 880px;
    margin: 12px auto;
    padding: 12px 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    font-size: 13px;
  }
  #livePanel .live-match {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #livePanel .live-badge {
    color: #ff3b30;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #livePanel .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  #livePanel .match-teams img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .match-score {
    font-weight: 700;
    font-size: 18px;
    color: var(--gold);
    padding: 0 8px;
  }
  #livePanel .match-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .next-match {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  #livePanel .next-badge {
    color: var(--gold);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #livePanel .next-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #livePanel .next-info .teams {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #livePanel .next-info img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .next-info .date-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .status-badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-live { background: #ff3b30; color: #fff; }
  .status-finished { background: #34c759; color: #fff; }
  .status-upcoming { background: #ff9500; color: #fff; }

  #wrap {
    width: min(94vw, 880px);
    margin: 0 auto;
    position: relative;
  }
  #stage {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Tamanhos dos nós por fase */
  .node-r32 { --size: 28px; }
  .node-r16 { --size: 34px; }
  .node-qf { --size: 42px; }
  .node-sf { --size: 52px; }
  .node-final { --size: 66px; }
  .node-champion { --size: 80px; }

  .node-img {
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
  }
  .node-img.pending {
    opacity: 0.32;
  }
  .node-img.champion {
    animation: championGlow 2s ease-in-out infinite;
  }
  @keyframes championGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(217,165,49,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(217,165,49,0.9)); }
  }

  .ring-label {
    fill: var(--muted);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Tooltip melhorado */
  .tooltip-modern {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 23, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 180px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .tooltip-modern.visible { opacity: 1; }
  .tooltip-modern .tt-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .tooltip-modern .tt-header img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 50%;
  }
  .tooltip-modern .tt-vs {
    color: var(--muted);
    font-weight: 400;
    padding: 0 4px;
  }
  .tooltip-modern .tt-score {
    color: var(--gold);
    font-weight: 700;
    font-size: 18px;
    margin: 4px 0;
  }
  .tooltip-modern .tt-details {
    color: var(--muted);
    font-size: 11px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .tooltip-modern .tt-details span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #status {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 10px 0 28px;
  }
  #status button {
    background: none;
    border: 1px solid var(--grey);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 12px;
    margin-left: 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  #status button:hover { border-color: var(--gold); color: var(--gold); }
  .err {
    max-width: 560px;
    margin: 20px auto;
    padding: 14px 18px;
    border: 1px solid #5b2a2a;
    background: #1c1010;
    border-radius: 8px;
    font-size: 13px;
    color: #f3b7b7;
  }

  @media (max-width: 640px) {
    #livePanel {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px 14px;
      font-size: 12px;
    }
    #livePanel .next-match {
      justify-content: flex-start;
    }
    #livePanel .match-score {
      font-size: 16px;
    }
  }
    /* Estilos específicos para tooltip de jogos futuros */
  .tooltip-modern .tt-upcoming {
    text-align: center;
  }
  .tooltip-modern .tt-upcoming .tt-badge {
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .tooltip-modern .tt-upcoming .tt-teams {
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    margin: 8px 0;
    letter-spacing: 0.02em;
  }
  .tooltip-modern .tt-upcoming .tt-teams strong {
    color: var(--gold);
    font-weight: 700;
    padding: 0 6px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 6px 0 4px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-upcoming .tt-stage {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .tooltip-modern .tt-upcoming .tt-venue {
    color: var(--muted);
    font-size: 12px;
  }

  /* Animações suaves para o tooltip */
  .tooltip-modern {
    transition: opacity 0.2s ease, transform 0.2s ease;
    transform: translateY(2px);
  }
  .tooltip-modern.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Estilo para jogos ao vivo no tooltip */
  .tooltip-modern .tt-live-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
    margin-right: 4px;
  }

  /* Tooltip para mobile - ajuste de tamanho */
  @media (max-width: 480px) {
    .tooltip-modern {
      min-width: 150px;
      padding: 10px 12px;
    }
    .tooltip-modern .tt-upcoming .tt-teams {
      font-size: 15px;
    }
    .tooltip-modern .tt-upcoming .tt-datetime {
      font-size: 11px;
      gap: 8px;
    }
    .tooltip-modern .tt-header {
      font-size: 12px;
    }
    .tooltip-modern .tt-header img {
      width: 22px;
      height: 22px;
    }
    .tooltip-modern .tt-score {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>🏆 FIFA World Cup 2026</h1>
    <p>Chave do mata-mata — atualizada automaticamente via API</p>
  </header>

  <!-- Painel Ao Vivo / Próximo Jogo -->
  <div id="livePanel">
    <div class="live-match">
      <span class="live-badge">● AO VIVO</span>
      <span class="match-teams" id="liveTeams">
        <img src="" alt=""> <span id="liveHome">—</span>
        <span class="match-score" id="liveScore">vs</span>
        <span id="liveAway">—</span> <img src="" alt="">
      </span>
      <span class="match-time" id="liveTime"></span>
      <span class="status-badge status-live" id="liveStatus">AO VIVO</span>
    </div>
    <div class="next-match">
      <span class="next-badge">⏰ PRÓXIMO</span>
      <div class="next-info">
        <span class="teams" id="nextTeams">
          <img src="" alt=""> <span id="nextHome">—</span>
          <span style="color:var(--muted)">vs</span>
          <span id="nextAway">—</span> <img src="" alt="">
        </span>
        <span class="date-time" id="nextDateTime">📅 --/-- • 🕘 --:--</span>
      </div>
    </div>
  </div>

  <div id="wrap">
    <svg id="stage" viewBox="0 0 1000 1000"></svg>
    <div class="tooltip-modern" id="tooltip"></div>
  </div>

  <div id="status">
    Carregando…
    <button id="refreshBtn">Atualizar agora</button>
  </div>

  <script type="module">
    const NS = "http://www.w3.org/2000/svg";
    const CX = 500, CY = 500;
    const POLL_MS = 90_000;

    // Tamanhos dos nós por nível (do mais externo ao centro)
    const NODE_SIZE = [28, 34, 42, 52, 66, 80];
    // Espessura das linhas por nível
    const LINE_WIDTH = [1.2, 2, 3, 4, 5];
    // Brilho por nível (blur)
    const GLOW_AMOUNT = [4, 8, 14, 20, 26];

    const LEVEL_R = [460, 400, 338, 276, 214, 130];
    const BRANCH_COLORS = [
      "#e6484f", "#3ddc84", "#f0c23d", "#4ea1f7",
      "#b768e0", "#ff9f53", "#2ec4b6", "#ff6f91",
    ];
    const GREY = "#3c3c40";

    const svg = document.getElementById("stage");
    const statusEl = document.getElementById("status");
    const tooltip = document.getElementById("tooltip");
    const livePanel = document.getElementById("livePanel");

    // Cores para status dos jogos
    const STATUS_COLORS = {
      'LIVE': '#ff3b30',
      'FINISHED': '#34c759',
      'SCHEDULED': '#ff9500',
      'TIMED': '#ff9500',
      'IN_PLAY': '#ff3b30',
      'PAUSED': '#ff9500',
      'SUSPENDED': '#ff9500',
      'POSTPONED': '#ff9500',
      'CANCELLED': '#8e8e93'
    };

    const STATUS_LABELS = {
      'LIVE': 'AO VIVO',
      'FINISHED': 'ENCERRADO',
      'SCHEDULED': 'EM BREVE',
      'TIMED': 'EM BREVE',
      'IN_PLAY': 'AO VIVO',
      'PAUSED': 'INTERVALO',
      'SUSPENDED': 'SUSPENSO',
      'POSTPONED': 'ADIADO',
      'CANCELLED': 'CANCELADO'
    };

    function el(tag, attrs) {
      const n = document.createElementNS(NS, tag);
      for (const k in attrs) n.setAttribute(k, attrs[k]);
      return n;
    }

    function polar(r, angleDeg) {
      const a = ((angleDeg - 90) * Math.PI) / 180;
      return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
    }

    function clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function drawBackground() {
      const defs = el("defs", {});
      
      // Gradiente radial atrás da taça
      const grad = el("radialGradient", { id: "bgGlow", cx: "50%", cy: "50%", r: "50%" });
      grad.appendChild(el("stop", { offset: "0%", "stop-color": "#3a2c0c", "stop-opacity": "0.6" }));
      grad.appendChild(el("stop", { offset: "30%", "stop-color": "#1c1508", "stop-opacity": "0.4" }));
      grad.appendChild(el("stop", { offset: "100%", "stop-color": "#0b0b0c", "stop-opacity": "1" }));
      defs.appendChild(grad);

      // Filtros para glow (com intensidade variável)
      for (let i = 0; i < GLOW_AMOUNT.length; i++) {
        const filter = el("filter", { 
          id: `glow-${i}`, 
          x: "-60%", y: "-60%", width: "220%", height: "220%" 
        });
        filter.appendChild(el("feGaussianBlur", { stdDeviation: GLOW_AMOUNT[i], result: "blur" }));
        const merge = el("feMerge", {});
        merge.appendChild(el("feMergeNode", { in: "blur" }));
        merge.appendChild(el("feMergeNode", { in: "SourceGraphic" }));
        filter.appendChild(merge);
        defs.appendChild(filter);
      }

      svg.appendChild(defs);
      svg.appendChild(el("rect", { x: 0, y: 0, width: 1000, height: 1000, fill: "url(#bgGlow)" }));

      // Anéis de referência sutis
      LEVEL_R.forEach((r) => {
        svg.appendChild(
          el("circle", { cx: CX, cy: CY, r, fill: "none", stroke: "#1c1c1f", "stroke-width": 0.5 })
        );
      });
    }

    function drawTrophy() {
      const g = el("g", {});
      
      // Círculo ao redor da taça
      g.appendChild(
        el("circle", { cx: CX, cy: CY, r: 62, fill: "#0b0b0c", stroke: "#3a2c0c", "stroke-width": 2 })
      );
      
      // Texto girando ao redor
      const textGroup = el("g", {});
      const textRadius = 78;
      const label = "FINAL • 13 JUL • METLIFE STADIUM • NEW YORK • ";
      for (let i = 0; i < label.length; i++) {
        const angle = (i / label.length) * 360;
        const [x, y] = polar(textRadius, angle);
        const char = el("text", {
          x, y,
          "font-size": "8",
          fill: "#8a8a8f",
          "text-anchor": "middle",
          "dominant-baseline": "central",
          transform: `rotate(${angle + 90}, ${x}, ${y})`,
          "letter-spacing": "2",
        });
        char.textContent = label[i];
        textGroup.appendChild(char);
      }
      // Animação de rotação
      const anim = el("animateTransform", {
        attributeName: "transform",
        type: "rotate",
        from: "0 500 500",
        to: "360 500 500",
        dur: "40s",
        repeatCount: "indefinite"
      });
      textGroup.appendChild(anim);
      g.appendChild(textGroup);

      // Taça
      const size = 76;
      g.appendChild(
        el("image", {
          x: CX - size / 2,
          y: CY - size / 2,
          width: size,
          height: size,
          href: "/taca.png",
          preserveAspectRatio: "xMidYMid meet",
          style: "filter: drop-shadow(0 0 30px rgba(217,165,49,0.4))",
        })
      );
      
      svg.appendChild(g);
    }

    function connector(rOuter, angleA, angleB, rMid, childAngle, rInner, color, glowLevel, lineWidth) {
      const g = el("g", {
        fill: "none",
        stroke: color,
        "stroke-width": lineWidth || 1.6,
        "stroke-linecap": "round",
        "stroke-linejoin": "round",
        opacity: glowLevel > 0 ? 1 : 0.45,
      });
      if (glowLevel > 0) {
        const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
        g.setAttribute("filter", `url(#glow-${idx})`);
      }

      const [x1, y1] = polar(rOuter, angleA);
      const [mx1, my1] = polar(rMid, angleA);
      const [x2, y2] = polar(rOuter, angleB);
      const [mx2, my2] = polar(rMid, angleB);
      const [cmx, cmy] = polar(rMid, childAngle);
      const [cx2, cy2] = polar(rInner, childAngle);

      const large = Math.abs(angleB - angleA) > 180 ? 1 : 0;
      const d =
        `M${x1},${y1} L${mx1},${my1} ` +
        `A${rMid},${rMid} 0 ${large} 1 ${mx2},${my2} ` +
        `M${mx2},${my2} L${x2},${y2} ` +
        `M${cmx},${cmy} L${cx2},${cy2}`;
      g.appendChild(el("path", { d }));

      svg.appendChild(g);
    }

    function teamNode(team, r, angle, branchColor, pending, size, glowLevel, isChampion) {
      const [x, y] = polar(r, angle);
      const g = el("g", { 
        class: "node", 
        "data-x": x, 
        "data-y": y,
        style: `--size: ${size}px`
      });

      const clipId = "clip-" + Math.random().toString(36).slice(2);
      const defs = el("defs", {});
      const clip = el("clipPath", { id: clipId });
      clip.appendChild(el("circle", { cx: x, cy: y, r: size / 2 }));
      defs.appendChild(clip);
      g.appendChild(defs);

      // Círculo com borda
      const ring = el("circle", {
        cx: x, cy: y, r: size / 2 + 2.5,
        fill: pending ? "#101012" : "#151517",
        stroke: pending ? GREY : (isChampion ? "#d9a531" : branchColor),
        "stroke-width": isChampion ? 3 : (pending ? 1.4 : 2.2),
      });
      if (glowLevel > 0 && !pending) {
        const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
        ring.setAttribute("filter", `url(#glow-${idx})`);
      }
      if (isChampion) {
        ring.setAttribute("stroke", "#d9a531");
        ring.setAttribute("stroke-width", "3");
        // Animação de pulsação
        const anim = el("animate", {
          attributeName: "r",
          values: `${size/2 + 2.5};${size/2 + 5};${size/2 + 2.5}`,
          dur: "2s",
          repeatCount: "indefinite"
        });
        ring.appendChild(anim);
        const anim2 = el("animate", {
          attributeName: "stroke-opacity",
          values: "1;0.6;1",
          dur: "2s",
          repeatCount: "indefinite"
        });
        ring.appendChild(anim2);
      }
      g.appendChild(ring);

      // Logo do time
      if (team && team.logo) {
        const img = el("image", {
          x: x - size / 2, y: y - size / 2, width: size, height: size,
          href: team.logo, 
          "clip-path": `url(#${clipId})`,
          class: `node-img${pending ? " pending" : ""}${isChampion ? " champion" : ""}`,
          preserveAspectRatio: "xMidYMid slice",
        });
        g.appendChild(img);
      } else {
        g.appendChild(el("circle", { cx: x, cy: y, r: size / 2 - 4, fill: "#222226" }));
      }

      // Placar abaixo do escudo (se houver)
      // Será adicionado pelo render

      // Eventos de mouse para tooltip
      if (team && team.name) {
        g.addEventListener("mouseenter", (ev) => {
          showTooltip(ev, team);
        });
        g.addEventListener("mousemove", (ev) => {
          tooltip.style.left = (ev.clientX + 16) + "px";
          tooltip.style.top = (ev.clientY + 16) + "px";
        });
        g.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
        });
      }

      svg.appendChild(g);
      return g;
    }

    // Versão completa e otimizada do showTooltip
function showTooltip(ev, team) {
  const match = team._matchData || {};
  const isUpcoming = match.isUpcoming || match.status === 'SCHEDULED' || match.status === 'TIMED';
  const isLive = match.isLive || match.status === 'IN_PLAY' || match.status === 'LIVE';
  const isFinished = match.isFinished || match.status === 'FINISHED';

  let html = '';
  
  if (isUpcoming) {
    // Tooltip para jogos futuros - limpo e informativo
    html = `
      <div class="tt-upcoming">
        <span class="tt-badge">⏰ ${match.statusLabel || 'EM BREVE'}</span>
        <div class="tt-teams">
          ${match.homeName || '—'} <strong>vs</strong> ${match.awayName || '—'}
        </div>
        <div class="tt-datetime">
          <span>📅 ${match.date || '--/--'}</span>
          <span>🕘 ${match.time || '--:--'}</span>
          ${match.venue ? `<span>📍 ${match.venue}</span>` : ''}
        </div>
        <div class="tt-stage">${match.stage || 'Fase eliminatória'}</div>
      </div>
    `;
  } else if (isLive) {
    // Tooltip para jogos ao vivo
    html = `
      <div class="tt-header">
        <span class="tt-live-indicator"></span>
        <span style="color: #ff3b30; font-weight: 700; font-size: 11px;">AO VIVO</span>
      </div>
      <div class="tt-header" style="margin-top: 2px;">
        <img src="${team.logo || ''}" alt="${team.name}">
        <span>${team.name}</span>
        <span class="tt-vs">vs</span>
        <img src="${match.opponent?.logo || ''}" alt="${match.opponent?.name || ''}">
        <span>${match.opponent?.name || '—'}</span>
      </div>
      <div class="tt-score">${match.score || '0 × 0'}</div>
      <div class="tt-details">
        <span>🏆 ${match.stage || 'Fase'}</span>
        <span>📅 ${match.date || '--/--'}</span>
        <span>🕘 ${match.time || '--:--'}</span>
        ${match.venue ? `<span>📍 ${match.venue}</span>` : ''}
      </div>
    `;
  } else if (isFinished) {
    // Tooltip para jogos encerrados
    html = `
      <div class="tt-header">
        <img src="${team.logo || ''}" alt="${team.name}">
        <span>${team.name}</span>
        <span class="tt-vs">vs</span>
        <img src="${match.opponent?.logo || ''}" alt="${match.opponent?.name || ''}">
        <span>${match.opponent?.name || '—'}</span>
      </div>
      <div class="tt-score">${match.score || '—'}</div>
      <div class="tt-details">
        <span>🏆 ${match.stage || 'Fase'}</span>
        <span>📅 ${match.date || '--/--'}</span>
        ${match.venue ? `<span>📍 ${match.venue}</span>` : ''}
        <span style="color: #34c759;">✅ ENCERRADO</span>
      </div>
    `;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
}

    function updateLivePanel(data) {
      const matches = [];
      // Coletar todos os jogos de todas as rodadas
      if (data.rounds) {
        for (const round of data.rounds) {
          for (const m of round.matches) {
            matches.push(m);
          }
        }
      }

      // Encontrar jogo ao vivo ou mais próximo
      const now = new Date();
      let liveMatch = null;
      let nextMatch = null;
      let earliestFuture = null;

      for (const m of matches) {
        const matchDate = new Date(m.date);
        const status = m.status || 'SCHEDULED';
        
        if (status === 'IN_PLAY' || status === 'LIVE' || status === 'PAUSED') {
          if (!liveMatch) liveMatch = m;
        } else if (status === 'FINISHED') {
          continue;
        } else {
          if (matchDate > now) {
            if (!earliestFuture || matchDate < earliestFuture.date) {
              earliestFuture = { match: m, date: matchDate };
            }
          }
        }
      }

      // Se não tiver ao vivo, usar o próximo
      if (!liveMatch && earliestFuture) {
        nextMatch = earliestFuture.match;
      } else if (liveMatch) {
        // Verificar se tem próximo depois do ao vivo
        for (const m of matches) {
          const matchDate = new Date(m.date);
          if (matchDate > new Date(liveMatch.date)) {
            if (!nextMatch || matchDate < new Date(nextMatch.date)) {
              nextMatch = m;
            }
          }
        }
      }

      // Atualizar painel AO VIVO
      if (liveMatch) {
        const home = liveMatch.home;
        const away = liveMatch.away;
        const score = liveMatch.score;
        const homeScore = score?.home ?? '—';
        const awayScore = score?.away ?? '—';
        const status = liveMatch.status || 'SCHEDULED';
        
        document.getElementById('liveHome').textContent = home.name || '—';
        document.getElementById('liveAway').textContent = away.name || '—';
        document.getElementById('liveScore').textContent = `${homeScore} × ${awayScore}`;
        document.getElementById('liveTime').textContent = `• ${new Date(liveMatch.date).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
        document.getElementById('liveStatus').textContent = STATUS_LABELS[status] || status;
        document.getElementById('liveStatus').className = `status-badge status-${status === 'FINISHED' ? 'finished' : (status === 'IN_PLAY' || status === 'LIVE' ? 'live' : 'upcoming')}`;
        
        const homeImg = document.querySelector('#liveTeams img:first-child');
        const awayImg = document.querySelector('#liveTeams img:last-child');
        if (homeImg) homeImg.src = home.logo || '';
        if (awayImg) awayImg.src = away.logo || '';
        document.querySelector('.live-badge').textContent = status === 'FINISHED' ? '✓ ENCERRADO' : '● AO VIVO';
      } else {
        document.querySelector('.live-match').style.opacity = '0.5';
        document.getElementById('liveHome').textContent = '—';
        document.getElementById('liveAway').textContent = '—';
        document.getElementById('liveScore').textContent = 'vs';
        document.getElementById('liveStatus').textContent = 'AGUARDANDO';
        document.getElementById('liveStatus').className = 'status-badge status-upcoming';
      }

      // Atualizar PRÓXIMO JOGO
      if (nextMatch) {
        const home = nextMatch.home;
        const away = nextMatch.away;
        const date = new Date(nextMatch.date);
        document.getElementById('nextHome').textContent = home.name || '—';
        document.getElementById('nextAway').textContent = away.name || '—';
        document.getElementById('nextDateTime').textContent = 
          `📅 ${date.toLocaleDateString('pt-BR')} • 🕘 ${date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
        const homeImg = document.querySelector('#nextTeams img:first-child');
        const awayImg = document.querySelector('#nextTeams img:last-child');
        if (homeImg) homeImg.src = home.logo || '';
        if (awayImg) awayImg.src = away.logo || '';
      } else {
        document.querySelector('.next-match').style.opacity = '0.5';
        document.getElementById('nextHome').textContent = '—';
        document.getElementById('nextAway').textContent = '—';
        document.getElementById('nextDateTime').textContent = '📅 --/-- • 🕘 --:--';
      }
    }

    function render(data) {
      clear(svg);
      drawBackground();

      const leaves = data.leaves || [];
      const N = leaves.length;
      if (N === 0) {
        statusEl.innerHTML =
          `Ainda sem confrontos de mata-mata publicados pela API. ` +
          `(Confira <code>/api/rounds</code> pra ver os nomes de fase disponíveis.)`;
        return;
      }

      const step = 360 / N;
      const branchSize = N / 8;
      let nodes = leaves.map((team, i) => ({
        team,
        angle: i * step,
        decided: true,
        branchIdx: Math.floor(i / branchSize) % 8,
      }));

      // Desenha folhas
      nodes.forEach((n) => {
        teamNode(n.team, LEVEL_R[0], n.angle, BRANCH_COLORS[n.branchIdx], false, NODE_SIZE[0], 0);
      });

      const rounds = data.rounds || [];
      let level = 0;

      for (let ri = 0; ri < rounds.length; ri++) {
        const round = rounds[ri];
        const r1 = LEVEL_R[level];
        const r2 = LEVEL_R[level + 1];
        const rMid = (r1 + r2) / 2;
        const isFinal = ri === rounds.length - 1;

        const newNodes = [];
        for (let i = 0; i < round.matches.length; i++) {
          const m = round.matches[i];
          const a = nodes[2 * i];
          const b = nodes[2 * i + 1];
          if (!a || !b) continue;

          const childAngle = (a.angle + b.angle) / 2;
          const winnerTeam = m.winnerId != null
            ? m.home.id === m.winnerId ? m.home : m.away
            : null;
          const decided = !!winnerTeam;
          const winnerIsHome = decided && m.home.id === m.winnerId;
          const branchIdx = decided ? (winnerIsHome ? a.branchIdx : b.branchIdx) : a.branchIdx;
          const color = decided ? BRANCH_COLORS[branchIdx] : GREY;
          
          // Guardar dados do jogo para tooltip
          const matchData = {
  opponent: decided ? (winnerIsHome ? m.away : m.home) : null,
  homeName: m.home?.name || '—',
  awayName: m.away?.name || '—',
  score: decided ? `${m.score?.home ?? '?'} × ${m.score?.away ?? '?'}` : '—',
  stage: round.label || `Fase ${ri + 1}`,
  date: new Date(m.date).toLocaleDateString('pt-BR'),
  time: new Date(m.date).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}),
  status: m.status || 'SCHEDULED',
  isUpcoming: ['SCHEDULED', 'TIMED'].includes(m.status),
  isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(m.status),
  isFinished: m.status === 'FINISHED',
  statusClass: m.status === 'FINISHED' ? 'finished' : 
               (['IN_PLAY', 'LIVE', 'PAUSED'].includes(m.status) ? 'live' : 'upcoming'),
  statusLabel: STATUS_LABELS[m.status] || m.status || 'EM BREVE',
  venue: m.venue || 'Estádio a definir'
};

          const glowLevel = Math.min(ri + 1, GLOW_AMOUNT.length);
          const lineWidth = Math.min(ri + 1, LINE_WIDTH.length);

          connector(r1, a.angle, b.angle, rMid, childAngle, r2, color, glowLevel, lineWidth);

          const teamObj = winnerTeam || { 
            name: `${a.team?.name ?? '?'} / ${b.team?.name ?? '?'} — a definir`, 
            logo: null,
            _matchData: matchData
          };
          teamObj._matchData = matchData;

          newNodes.push({
            team: teamObj,
            angle: childAngle,
            decided,
            branchIdx,
          });
        }

        nodes = newNodes;
        level += 1;

        // Desenha os nós
        const isChampion = level === LEVEL_R.length - 1;
        const sizeIdx = Math.min(level, NODE_SIZE.length - 1);
        const glowIdx = Math.min(level, GLOW_AMOUNT.length - 1);

        nodes.forEach((n, idx) => {
          const isChampionNode = isChampion && n.decided && idx === 0;
          teamNode(
            n.team, 
            LEVEL_R[level], 
            n.angle, 
            n.decided ? BRANCH_COLORS[n.branchIdx] : GREY, 
            !n.decided, 
            NODE_SIZE[sizeIdx], 
            n.decided ? glowIdx : 0,
            isChampionNode
          );
        });
      }

      drawTrophy();
      updateLivePanel(data);

      const ts = new Date(data.updatedAt).toLocaleString("pt-BR");
      statusEl.innerHTML = `Atualizado em ${ts} <button id="refreshBtn">Atualizar agora</button>`;
      document.getElementById("refreshBtn")?.addEventListener("click", load);
    }

    async function load() {
      statusEl.textContent = "Atualizando…";
      try {
        const res = await fetch("/api/bracket", { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erro desconhecido");
        render(data);
      } catch (err) {
        svg.innerHTML = "";
        statusEl.innerHTML = `<div class="err">Não foi possível carregar o bracket: ${String(err.message || err)}</div>`;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", load);
    load();
    setInterval(load, POLL_MS);
  </script>
</body>
</html>
