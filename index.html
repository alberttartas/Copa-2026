<script type="module">

const NS = 'http://www.w3.org/2000/svg';

const svgLayer = document.getElementById('bracket-layer');
const tooltipEl = document.getElementById('tooltip');
const panelEl = document.getElementById('panel');
const statusText = document.getElementById('statusText');
const refreshBtn = document.getElementById('refreshBtn');

const state = {
  rounds: [],
  leaves: [],
  hover: null,
  updatedAt: null,
};

const CX = 600, CY = 500;

const LEVEL_R = [420, 360, 300, 240, 180, 120];

const BRANCH_COLORS = [
  '#e6484f', '#3ddc84', '#f0c23d', '#4ea1f7',
  '#b768e0', '#ff9f53', '#2ec4b6', '#ff6f91',
];

const GREY = '#3c3c40';

const NODE_RADIUS = 16;

function el(tag, attrs = {}) {
  const n = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v);
  return n;
}

function polar(r, a) {
  return [CX + r * Math.sin(a), CY - r * Math.cos(a)];
}

function safe(v, f = 0) {
  return isFinite(v) ? v : f;
}

function midAngle(a, b) {
  let d = b - a;
  if (d > Math.PI) d -= 2 * Math.PI;
  if (d < -Math.PI) d += 2 * Math.PI;
  return a + d / 2;
}

function clearSVG() {
  while (svgLayer.firstChild) svgLayer.removeChild(svgLayer.firstChild);
}

function drawNode(team, r, a, color, pending, matchId) {
  if (!isFinite(a)) return;
  const [x, y] = polar(r, a);
  if (!isFinite(x) || !isFinite(y)) return;

  const g = el('g');

  g.appendChild(el('circle', {
    cx: x,
    cy: y,
    r: NODE_RADIUS,
    fill: pending ? '#222' : color,
    stroke: '#000',
    'stroke-width': 1.5
  }));

  const t = el('text', {
    x,
    y: y + 4,
    'text-anchor': 'middle',
    'font-size': 9,
    fill: '#fff'
  });

  t.textContent = team?.code || 'TBD';
  g.appendChild(t);

  g.addEventListener('mouseenter', (e) => {
    const rect = svgLayer.getBoundingClientRect();
    state.hover = {
      matchId,
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
    renderUI();
  });

  g.addEventListener('mouseleave', () => {
    state.hover = null;
    renderUI();
  });

  svgLayer.appendChild(g);
}

function drawConnection(r, a, b, color) {
  if (!isFinite(a) || !isFinite(b)) return;

  const [x1, y1] = polar(r, a);
  const [x2, y2] = polar(r, b);

  if (!isFinite(x1) || !isFinite(y1) || !isFinite(x2) || !isFinite(y2)) return;

  const p = el('path', {
    d: `M${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2}`,
    stroke: color,
    fill: 'none',
    'stroke-width': 2
  });

  svgLayer.appendChild(p);
}

/* =========================
   INDEXAÇÃO SEGURA
========================= */

const matchMap = new Map();

function indexMatches(rounds) {
  matchMap.clear();
  for (const r of rounds) {
    for (const m of (r.matches || [])) {
      matchMap.set(m.fixtureId, m);
    }
  }
}

function propagateWinners(rounds) {
  indexMatches(rounds);

  for (const r of rounds) {
    for (const m of (r.matches || [])) {
      if (!m.nextMatchId) continue;

      const next = matchMap.get(m.nextMatchId);
      if (!next) continue;

      let winner = null;

      if (m.winnerId != null) {
        winner = (m.home?.id === m.winnerId) ? m.home : m.away;
      } else if (m.status === 'FINISHED') {
        const h = m.score?.home ?? 0;
        const a = m.score?.away ?? 0;

        if (h > a) winner = m.home;
        else if (a > h) winner = m.away;
      }

      if (!winner) continue;

      if (m.nextSlot === 'home') next.home = winner;
      else if (m.nextSlot === 'away') next.away = winner;
    }
  }
}

/* =========================
   RENDER
========================= */

function render() {
  clearSVG();

  const rounds = state.rounds || [];
  const leaves = state.leaves || [];

  if (!rounds.length || !leaves.length) return;

  propagateWinners(rounds);

  const N = leaves.length;

  let prevNodes = leaves.map((t, i) => {
    const a = (i / N) * Math.PI * 2 - Math.PI / 2;
    const colorIndex = Math.floor(i / (N / 8)) % 8;

    drawNode(t, LEVEL_R[0], a, BRANCH_COLORS[colorIndex], false, null);

    return {
      team: t,
      angle: a,
      colorIndex
    };
  });

  for (let ri = 0; ri < rounds.length; ri++) {
    const matches = rounds[ri].matches || [];
    const r1 = LEVEL_R[ri];
    const r2 = LEVEL_R[ri + 1] || LEVEL_R[LEVEL_R.length - 1];

    const current = [];

    for (const m of matches) {
      const homeParent = prevNodes.find(n => n.team?.id && n.team.id === m.home?.id);
      const awayParent = prevNodes.find(n => n.team?.id && n.team.id === m.away?.id);

      if (!homeParent || !awayParent) continue;

      const a = midAngle(homeParent.angle, awayParent.angle);

      let winner = null;
      if (m.winnerId != null) {
        winner = (m.home?.id === m.winnerId) ? m.home : m.away;
      }

      const color =
        BRANCH_COLORS[homeParent.colorIndex ?? awayParent.colorIndex ?? 0];

      drawConnection(r1, homeParent.angle, awayParent.angle, color);

      drawNode(
        winner || { code: 'TBD' },
        r2,
        a,
        winner ? color : GREY,
        !winner,
        m.fixtureId
      );

      current.push({
        team: winner || {},
        angle: a,
        colorIndex: homeParent.colorIndex ?? 0
      });
    }

    prevNodes = current;
  }
}

function renderUI() {
  if (!tooltipEl || !panelEl) return;

  const h = state.hover;
  if (!h) {
    tooltipEl.style.opacity = 0;
    panelEl.style.opacity = 0;
    return;
  }

  tooltipEl.style.opacity = 1;
  tooltipEl.style.transform =
    `translate3d(${h.x+10}px,${h.y+10}px,0)`;
}

/* =========================
   LOAD
========================= */

async function load() {
  const res = await fetch('/api/bracket');
  const data = await res.json();

  state.rounds = data.rounds || [];
  state.leaves = data.leaves || [];

  render();
}

refreshBtn.onclick = load;

load();
setInterval(load, 90000);

</script>
