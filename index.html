<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copa do Mundo 2026 — Chave Oficial</title>
<style>
  :root {
    --bg: #0b0b0c;
    --panel: rgba(21, 21, 23, 0.6);
    --grey: #3c3c40;
    --gold: #d9a531;
    --text: #e9e6df;
    --muted: #8a8a8f;
    --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 12px 16px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--muted);
  }

  #livePanel {
    max-width: 880px;
    margin: 12px auto;
    padding: 12px 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    font-size: 13px;
    transition: grid-template-columns 0.2s;
  }
  #livePanel.no-live {
    grid-template-columns: 1fr;
  }
  #livePanel.no-live .live-match {
    display: none;
  }
  #livePanel.no-live .next-match {
    justify-content: center;
  }
  #livePanel .live-match {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #livePanel .live-badge {
    color: #ff3b30;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #livePanel .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  #livePanel .match-teams img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .match-score {
    font-weight: 700;
    font-size: 18px;
    color: var(--gold);
    padding: 0 8px;
  }
  #livePanel .match-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .next-match {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  #livePanel .next-badge {
    color: var(--gold);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #livePanel .next-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #livePanel .next-info .teams {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #livePanel .next-info img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .next-info .date-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .status-badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-live { background: #ff3b30; color: #fff; }
  .status-finished { background: #34c759; color: #fff; }
  .status-upcoming { background: #ff9500; color: #fff; }

  #wrap {
    width: min(94vw, 880px);
    margin: 0 auto;
    position: relative;
  }
  #stage {
    width: 100%;
    height: auto;
    display: block;
  }

  .node-img {
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
  }
  .node-img.pending {
    opacity: 0.32;
  }
  .node-img.champion {
    animation: championGlow 2s ease-in-out infinite;
  }
  @keyframes championGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(217,165,49,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(217,165,49,0.9)); }
  }

  .conf-badge {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.75));
    pointer-events: none;
  }

  .ring-label {
    fill: var(--muted);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tooltip-modern {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 23, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 180px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .tooltip-modern.visible { opacity: 1; }
  .tooltip-modern.pinned { pointer-events: auto; }
  .tooltip-modern .tt-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .tooltip-modern .tt-header img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 50%;
  }
  .tooltip-modern .tt-vs {
    color: var(--muted);
    font-weight: 400;
    padding: 0 4px;
  }
  .tooltip-modern .tt-score {
    color: var(--gold);
    font-weight: 700;
    font-size: 18px;
    margin: 4px 0;
  }
  .tooltip-modern .tt-details {
    color: var(--muted);
    font-size: 11px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .tooltip-modern .tt-details span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-close {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    padding: 0 4px;
  }
  .tooltip-modern .tt-close:hover { color: var(--gold); }
  .tooltip-modern .tt-loading {
    color: var(--muted);
    font-size: 12px;
  }
  .tooltip-modern .tt-info-row {
    font-size: 12px;
    margin-top: 4px;
    line-height: 1.5;
  }
  .tooltip-modern .tt-info-row strong {
    color: var(--text);
  }
  .tooltip-modern .tt-scorer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .tooltip-modern .tt-scorer-photo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.1);
    background: #1c1c1f;
    flex-shrink: 0;
  }
  .tooltip-modern .tt-upcoming {
    text-align: center;
  }
  .tooltip-modern .tt-upcoming .tt-badge {
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .tooltip-modern .tt-upcoming .tt-teams {
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    margin: 8px 0;
    letter-spacing: 0.02em;
  }
  .tooltip-modern .tt-upcoming .tt-teams strong {
    color: var(--gold);
    font-weight: 700;
    padding: 0 6px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 6px 0 4px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-upcoming .tt-stage {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .tooltip-modern .tt-live-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
    margin-right: 4px;
  }

  #status {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 10px 0 28px;
  }
  #status button {
    background: none;
    border: 1px solid var(--grey);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 12px;
    margin-left: 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  #status button:hover { border-color: var(--gold); color: var(--gold); }
  .err {
    max-width: 560px;
    margin: 20px auto;
    padding: 14px 18px;
    border: 1px solid #5b2a2a;
    background: #1c1010;
    border-radius: 8px;
    font-size: 13px;
    color: #f3b7b7;
  }

  @media (max-width: 640px) {
    #livePanel {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px 14px;
      font-size: 12px;
    }
    #livePanel .next-match {
      justify-content: flex-start;
    }
    #livePanel .match-score {
      font-size: 16px;
    }
    .tooltip-modern {
      min-width: 150px;
      padding: 10px 12px;
    }
    .tooltip-modern .tt-upcoming .tt-teams {
      font-size: 15px;
    }
    .tooltip-modern .tt-upcoming .tt-datetime {
      font-size: 11px;
      gap: 8px;
    }
    .tooltip-modern .tt-header {
      font-size: 12px;
    }
    .tooltip-modern .tt-header img {
      width: 22px;
      height: 22px;
    }
    .tooltip-modern .tt-score {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>🏆 FIFA World Cup 2026</h1>
    <p>Chave do mata-mata — atualizada automaticamente via API · clique numa seleção para ver último jogo e artilheiro</p>
  </header>

  <div id="livePanel">
    <div class="live-match">
      <span class="live-badge">● AO VIVO</span>
      <span class="match-teams" id="liveTeams">
        <img src="" alt=""> <span id="liveHome">—</span>
        <span class="match-score" id="liveScore">vs</span>
        <span id="liveAway">—</span> <img src="" alt="">
      </span>
      <span class="match-time" id="liveTime"></span>
      <span class="status-badge status-live" id="liveStatus">AO VIVO</span>
    </div>
    <div class="next-match">
      <span class="next-badge">⏰ PRÓXIMO</span>
      <div class="next-info">
        <span class="teams" id="nextTeams">
          <img src="" alt=""> <span id="nextHome">—</span>
          <span style="color:var(--muted)">vs</span>
          <span id="nextAway">—</span> <img src="" alt="">
        </span>
        <span class="date-time" id="nextDateTime">📅 --/-- • 🕘 --:--</span>
      </div>
    </div>
  </div>

  <div id="wrap">
    <svg id="stage" viewBox="0 0 1000 1000"></svg>
    <div class="tooltip-modern" id="tooltip"></div>
  </div>

  <div id="status">
    Carregando…
    <button id="refreshBtn">Atualizar agora</button>
  </div>

   <script type="module">
    // ============================================================
//  BRACKET CIRCULAR – RENDERIZAÇÃO POR FASE (SEM LOOKUP)
//  ✅ backend já entrega rounds prontos
//  ✅ front apenas desenha, sem reconstruir árvore
//  ✅ layout radial (círculo) com conectores suaves
//  ✅ tooltip, destaque de vencedor, AO VIVO
// ============================================================

// ---------- CONSTANTES ----------
const NS = 'http://www.w3.org/2000/svg';
const CX = 500, CY = 500;
const LEVEL_R = [460, 400, 338, 276, 214, 130];
const NODE_SIZE = [28, 34, 42, 52, 66, 80];
const BRANCH_COLORS = [
  '#e6484f', '#3ddc84', '#f0c23d', '#4ea1f7',
  '#b768e0', '#ff9f53', '#2ec4b6', '#ff6f91'
];
const GREY = '#3c3c40';
const GLOW_AMOUNT = [4, 8, 14, 20, 26];
const STATUS_LABELS = {
  LIVE: 'AO VIVO',
  FINISHED: 'ENCERRADO',
  SCHEDULED: 'EM BREVE',
  TIMED: 'EM BREVE',
  IN_PLAY: 'AO VIVO',
  PAUSED: 'INTERVALO',
};

// ---------- DOM REFS ----------
const svg = document.getElementById('stage');
const statusEl = document.getElementById('status');
const tooltip = document.getElementById('tooltip');
const livePanel = document.getElementById('livePanel');
let currentData = null;

// ---------- FUNÇÕES AUXILIARES ----------
function el(tag, attrs) {
  const n = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) n.setAttribute(k, v);
  return n;
}

function polar(r, angleDeg) {
  const a = ((angleDeg - 90) * Math.PI) / 180;
  return [CX + r * Math.cos(a), CY + r * Math.sin(a)];
}

function normalizeAngle(a) {
  a = a % 360;
  if (a < 0) a += 360;
  return a;
}

function angleDiff(a, b) {
  let d = normalizeAngle(b - a);
  if (d > 180) d -= 360;
  if (d < -180) d += 360;
  return d;
}

function midAngle(a, b) {
  return normalizeAngle(a + angleDiff(a, b) / 2);
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

// ---------- DESENHO DE FUNDO ----------
function drawBackground() {
  const defs = el('defs');
  const grad = el('radialGradient', { id: 'bgGlow', cx: '50%', cy: '50%', r: '50%' });
  grad.appendChild(el('stop', { offset: '0%', 'stop-color': '#3a2c0c', 'stop-opacity': '0.6' }));
  grad.appendChild(el('stop', { offset: '30%', 'stop-color': '#1c1508', 'stop-opacity': '0.4' }));
  grad.appendChild(el('stop', { offset: '100%', 'stop-color': '#0b0b0c', 'stop-opacity': '1' }));
  defs.appendChild(grad);

  for (let i = 0; i < GLOW_AMOUNT.length; i++) {
    const filter = el('filter', { id: `glow-${i}`, x: '-60%', y: '-60%', width: '220%', height: '220%' });
    filter.appendChild(el('feGaussianBlur', { stdDeviation: GLOW_AMOUNT[i], result: 'blur' }));
    const merge = el('feMerge');
    merge.appendChild(el('feMergeNode', { in: 'blur' }));
    merge.appendChild(el('feMergeNode', { in: 'SourceGraphic' }));
    filter.appendChild(merge);
    defs.appendChild(filter);
  }

  svg.appendChild(defs);
  svg.appendChild(el('rect', { x: 0, y: 0, width: 1000, height: 1000, fill: 'url(#bgGlow)' }));

  LEVEL_R.forEach(r => {
    svg.appendChild(el('circle', { cx: CX, cy: CY, r, fill: 'none', stroke: '#1c1c1f', 'stroke-width': 0.5 }));
  });
}

// ---------- DESENHO DE CONECTOR (ARCO + LINHA) ----------
function drawConnector(rOuter, angleA, angleB, rMid, childAngle, rInner, color, glowLevel, lineWidth) {
  const g = el('g', {
    fill: 'none',
    stroke: color,
    'stroke-width': lineWidth || 1.6,
    'stroke-linecap': 'round',
    'stroke-linejoin': 'round',
    opacity: glowLevel > 0 ? 1 : 0.45
  });

  if (glowLevel > 0) {
    const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
    g.setAttribute('filter', `url(#glow-${idx})`);
  }

  const [x1, y1] = polar(rOuter, angleA);
  const [x2, y2] = polar(rOuter, angleB);
  const [mx1, my1] = polar(rMid, angleA);
  const [mx2, my2] = polar(rMid, angleB);
  const [cx2, cy2] = polar(rInner, childAngle);
  const [cmx, cmy] = polar(rMid, childAngle);

  const diff = angleDiff(angleA, angleB);
  const large = Math.abs(diff) > 180 ? 1 : 0;
  const sweep = diff >= 0 ? 1 : 0;

  const d =
    `M${x1},${y1} L${mx1},${my1} ` +
    `A${rMid},${rMid} 0 ${large} ${sweep} ${mx2},${my2} ` +
    `L${x2},${y2} M${cmx},${cmy} L${cx2},${cy2}`;

  g.appendChild(el('path', { d }));
  svg.appendChild(g);
}

// ---------- DESENHO DE UM NÓ (TIME) ----------
function drawTeamNode(team, r, angle, branchColor, pending, size, glowLevel, isChampion) {
  const [x, y] = polar(r, angle);
  const g = el('g', { class: 'node', 'data-x': x, 'data-y': y });

  const clipId = 'clip-' + Math.random().toString(36).slice(2);
  const defs = el('defs');
  const clip = el('clipPath', { id: clipId });
  clip.appendChild(el('circle', { cx: x, cy: y, r: size / 2 }));
  defs.appendChild(clip);
  g.appendChild(defs);

  const ring = el('circle', {
    cx: x, cy: y,
    r: size / 2 + 2.5,
    fill: pending ? '#101012' : '#151517',
    stroke: pending ? GREY : (isChampion ? '#d9a531' : branchColor),
    'stroke-width': isChampion ? 3 : (pending ? 1.4 : 2.2)
  });

  if (glowLevel > 0 && !pending) {
    const idx = Math.min(glowLevel - 1, GLOW_AMOUNT.length - 1);
    ring.setAttribute('filter', `url(#glow-${idx})`);
  }

  if (isChampion) {
    ring.setAttribute('stroke', '#d9a531');
    ring.setAttribute('stroke-width', '3');
    const anim = el('animate', {
      attributeName: 'r',
      values: `${size/2+2.5};${size/2+5};${size/2+2.5}`,
      dur: '2s',
      repeatCount: 'indefinite'
    });
    ring.appendChild(anim);
  }
  g.appendChild(ring);

  if (team && team.logo) {
    const img = el('image', {
      x: x - size/2, y: y - size/2,
      width: size, height: size,
      href: team.logo,
      'clip-path': `url(#${clipId})`,
      class: `node-img${pending ? ' pending' : ''}${isChampion ? ' champion' : ''}`,
      preserveAspectRatio: 'xMidYMid slice'
    });
    g.appendChild(img);
  } else {
    g.appendChild(el('circle', { cx: x, cy: y, r: size/2 - 4, fill: '#222226' }));
  }

  // (Confederação – mantido do original, pode ser adaptado)

  // Eventos (tooltip)
  if (team && team.name) {
    g.addEventListener('mouseenter', (ev) => {
      if (tooltip.classList.contains('pinned')) return;
      showTooltip(ev, team);
    });
    g.addEventListener('mousemove', (ev) => {
      if (tooltip.classList.contains('pinned')) return;
      tooltip.style.left = (ev.clientX + 16) + 'px';
      tooltip.style.top = (ev.clientY + 16) + 'px';
    });
    g.addEventListener('mouseleave', () => {
      if (tooltip.classList.contains('pinned')) return;
      tooltip.classList.remove('visible');
    });
    if (team.id && !pending) {
      g.style.cursor = 'pointer';
      g.addEventListener('click', (ev) => {
        ev.stopPropagation();
        showTeamDetails(ev, team);
      });
    }
  }

  svg.appendChild(g);
  return g;
}

// ---------- TOOLTIP ----------
function showTooltip(ev, team) {
  const match = team._matchData || {};
  const isUpcoming = match.isUpcoming || match.status === 'SCHEDULED' || match.status === 'TIMED';
  const isLive = match.isLive || match.status === 'IN_PLAY' || match.status === 'LIVE';

  let html = '';
  if (isUpcoming) {
    html = `
      <div class="tt-upcoming">
        <span class="tt-badge">⏰ ${match.statusLabel || 'EM BREVE'}</span>
        <div class="tt-teams">${match.homeName || '—'} <strong>vs</strong> ${match.awayName || '—'}</div>
        <div class="tt-datetime">
          <span>📅 ${match.date || '--/--'}</span>
          <span>🕘 ${match.time || '--:--'}</span>
        </div>
        <div class="tt-stage">${match.stage || 'Fase eliminatória'}</div>
      </div>
    `;
  } else if (isLive) {
    html = `
      <div class="tt-header">
        <span class="tt-live-indicator"></span>
        <span style="color:#ff3b30;font-weight:700;font-size:11px;">AO VIVO</span>
      </div>
      <div class="tt-header">
        <img src="${team.logo || ''}" alt="${team.name}">
        <span>${team.name}</span>
        <span class="tt-vs">vs</span>
        <img src="${match.opponent?.logo || ''}" alt="${match.opponent?.name || ''}">
        <span>${match.opponent?.name || '—'}</span>
      </div>
      <div class="tt-score">${match.score || '0 × 0'}</div>
      <div class="tt-details">
        <span>🏆 ${match.stage || 'Fase'}</span>
        <span>📅 ${match.date || '--/--'}</span>
        <span>🕘 ${match.time || '--:--'}</span>
      </div>
    `;
  } else {
    html = `
      <div class="tt-header">
        <img src="${team.logo || ''}" alt="${team.name}">
        <span>${team.name}</span>
        <span class="tt-vs">vs</span>
        <img src="${match.opponent?.logo || ''}" alt="${match.opponent?.name || ''}">
        <span>${match.opponent?.name || '—'}</span>
      </div>
      <div class="tt-score">${match.score || '—'}</div>
      <div class="tt-details">
        <span>🏆 ${match.stage || 'Fase'}</span>
        <span>📅 ${match.date || '--/--'}</span>
        <span style="color:#34c759;">✅ ENCERRADO</span>
      </div>
    `;
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
}

function showTeamDetails(ev, team) {
  // (mesmo do original, com fallback)
  tooltip.style.left = (ev.clientX + 16) + 'px';
  tooltip.style.top = (ev.clientY + 16) + 'px';
  tooltip.innerHTML = `
    <div class="tt-header">
      <img src="${team.logo || ''}" alt="${team.name}">
      <span>${team.name}</span>
      <span class="tt-close" id="ttClose">✕</span>
    </div>
    <div class="tt-loading">Carregando…</div>
  `;
  tooltip.classList.add('visible', 'pinned');
  document.getElementById('ttClose')?.addEventListener('click', (e) => {
    e.stopPropagation();
    tooltip.classList.remove('visible', 'pinned');
  });

  fetch(`/api/team-info?teamId=${team.id}`)
    .then(r => r.json())
    .then(data => {
      const lm = data.lastMatch;
      const ts = data.topScorer;
      const lastMatchHtml = lm
        ? `${lm.homeTeam} <strong>${lm.homeScore ?? '?'} × ${lm.awayScore ?? '?'}</strong> ${lm.awayTeam}`
        : 'Sem jogos encerrados ainda.';
      const scorerHtml = ts
        ? `<div class="tt-scorer-row"><img class="tt-scorer-photo" src="/assets/img/art/${encodeURIComponent(ts.name)}.png" alt="${ts.name}" onerror="this.style.display='none'"><span>${ts.name} — ${ts.goals} gol${ts.goals === 1 ? '' : 's'}</span></div>`
        : 'Sem dados disponíveis.';
      tooltip.innerHTML = `
        <div class="tt-header">
          <img src="${team.logo || ''}" alt="${team.name}">
          <span>${team.name}</span>
          <span class="tt-close" id="ttClose">✕</span>
        </div>
        <div class="tt-info-row"><strong>Último jogo:</strong><br>${lastMatchHtml}</div>
        <div class="tt-info-row"><strong>Artilheiro da seleção:</strong>${scorerHtml}</div>
      `;
      document.getElementById('ttClose')?.addEventListener('click', (e) => {
        e.stopPropagation();
        tooltip.classList.remove('visible', 'pinned');
      });
    })
    .catch(() => {
      tooltip.innerHTML = `
        <div class="tt-header"><span>${team.name}</span><span class="tt-close" id="ttClose">✕</span></div>
        <div class="tt-details">Não foi possível carregar os dados agora.</div>
      `;
      document.getElementById('ttClose')?.addEventListener('click', (e) => {
        e.stopPropagation();
        tooltip.classList.remove('visible', 'pinned');
      });
    });
}

document.addEventListener('click', () => {
  if (tooltip.classList.contains('pinned')) {
    tooltip.classList.remove('visible', 'pinned');
  }
});

// ---------- LIVE PANEL ----------
function updateLivePanel(data) {
  // (igual ao original, pode ser mantido)
  const matches = [];
  if (data.rounds) {
    for (const round of data.rounds) {
      for (const m of round.matches) {
        matches.push(m);
      }
    }
  }

  const now = new Date();
  let liveMatch = null;
  let nextMatch = null;
  let earliestFuture = null;

  for (const m of matches) {
    const matchDate = new Date(m.date);
    const status = m.status || 'SCHEDULED';
    if (status === 'IN_PLAY' || status === 'LIVE' || status === 'PAUSED') {
      if (!liveMatch) liveMatch = m;
    } else if (status === 'FINISHED') {
      continue;
    } else {
      if (matchDate > now) {
        if (!earliestFuture || matchDate < earliestFuture.date) {
          earliestFuture = { match: m, date: matchDate };
        }
      }
    }
  }

  if (!liveMatch && earliestFuture) {
    nextMatch = earliestFuture.match;
  } else if (liveMatch) {
    for (const m of matches) {
      const matchDate = new Date(m.date);
      if (matchDate > new Date(liveMatch.date)) {
        if (!nextMatch || matchDate < new Date(nextMatch.date)) {
          nextMatch = m;
        }
      }
    }
  }

  livePanel.classList.toggle('no-live', !liveMatch);

  if (liveMatch) {
    const home = liveMatch.home;
    const away = liveMatch.away;
    const score = liveMatch.score;
    const homeScore = score?.home ?? '—';
    const awayScore = score?.away ?? '—';
    const status = liveMatch.status || 'SCHEDULED';

    document.getElementById('liveHome').textContent = home.name || '—';
    document.getElementById('liveAway').textContent = away.name || '—';
    document.getElementById('liveScore').textContent = `${homeScore} × ${awayScore}`;
    document.getElementById('liveTime').textContent = `• ${new Date(liveMatch.date).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
    document.getElementById('liveStatus').textContent = STATUS_LABELS[status] || status;
    document.getElementById('liveStatus').className = `status-badge status-${status === 'FINISHED' ? 'finished' : (status === 'IN_PLAY' || status === 'LIVE' ? 'live' : 'upcoming')}`;

    const homeImg = document.querySelector('#liveTeams img:first-child');
    const awayImg = document.querySelector('#liveTeams img:last-child');
    if (homeImg) homeImg.src = home.logo || '';
    if (awayImg) awayImg.src = away.logo || '';
    document.querySelector('.live-badge').textContent = status === 'FINISHED' ? '✓ ENCERRADO' : '● AO VIVO';
  }

  if (nextMatch) {
    const home = nextMatch.home;
    const away = nextMatch.away;
    const date = new Date(nextMatch.date);
    document.querySelector('.next-match').style.opacity = '1';
    document.getElementById('nextHome').textContent = home.name || '—';
    document.getElementById('nextAway').textContent = away.name || '—';
    document.getElementById('nextDateTime').textContent =
      `📅 ${date.toLocaleDateString('pt-BR')} • 🕘 ${date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
    const homeImg = document.querySelector('#nextTeams img:first-child');
    const awayImg = document.querySelector('#nextTeams img:last-child');
    if (homeImg) homeImg.src = home.logo || '';
    if (awayImg) awayImg.src = away.logo || '';
  } else {
    document.querySelector('.next-match').style.opacity = '0.5';
    document.getElementById('nextHome').textContent = '—';
    document.getElementById('nextAway').textContent = '—';
    document.getElementById('nextDateTime').textContent = '📅 --/-- • 🕘 --:--';
  }
}

// ---------- RENDERIZAÇÃO PRINCIPAL (CIRCULAR) ----------
function render(data) {
  clear(svg);
  drawBackground();

  const rounds = data.rounds || [];
  const validRounds = rounds.filter(r => r.matches && r.matches.length > 0);

  if (validRounds.length === 0) {
    statusEl.innerHTML = '⚠️ Nenhuma fase encontrada.';
    return;
  }

  console.log(`📊 Renderizando ${validRounds.length} fases (circular)`);

  // ---------- 1. DESENHAR NÓS DA PRIMEIRA FASE ----------
  const firstRound = validRounds[0];
  const totalMatches = firstRound.matches.length;
  const firstRadius = LEVEL_R[0];
  const firstSize = NODE_SIZE[0];

  // Mapear cada match para um ângulo
  firstRound.matches.forEach((match, idx) => {
    const step = 360 / totalMatches;
    const baseAngle = idx * step;
    const branchIdx = Math.floor(idx / (totalMatches / 8)) % 8;

    // Time da casa
    const homeAngle = normalizeAngle(baseAngle - step * 0.2);
    let homeTeam = match.home || { name: 'TBD', logo: null, id: null, code: null };
    homeTeam._matchData = {
      opponent: match.away,
      homeName: homeTeam.name,
      awayName: match.away?.name || '—',
      score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
      stage: firstRound.label,
      date: new Date(match.date).toLocaleDateString('pt-BR'),
      time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
      status: match.status || 'SCHEDULED',
      isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
      isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
      isFinished: match.status === 'FINISHED',
      statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
    };
    const pendingHome = !homeTeam.id || homeTeam.name === 'TBD';
    drawTeamNode(homeTeam, firstRadius, homeAngle, pendingHome ? GREY : BRANCH_COLORS[branchIdx], pendingHome, firstSize, 0, false);

    // Time visitante
    const awayAngle = normalizeAngle(baseAngle + step * 0.2);
    let awayTeam = match.away || { name: 'TBD', logo: null, id: null, code: null };
    awayTeam._matchData = {
      opponent: match.home,
      homeName: match.home?.name || '—',
      awayName: awayTeam.name,
      score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
      stage: firstRound.label,
      date: new Date(match.date).toLocaleDateString('pt-BR'),
      time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
      status: match.status || 'SCHEDULED',
      isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
      isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
      isFinished: match.status === 'FINISHED',
      statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
    };
    const pendingAway = !awayTeam.id || awayTeam.name === 'TBD';
    drawTeamNode(awayTeam, firstRadius, awayAngle, pendingAway ? GREY : BRANCH_COLORS[branchIdx], pendingAway, firstSize, 0, false);
  });

  // ---------- 2. CONSTRUIR LISTA DE NÓS PARA CONEXÕES ----------
  // Vamos armazenar os ângulos de cada nó por fase, indexados por posição
  const nodesByRound = [];
  // Primeira fase: todos os nós (home e away) em ordem
  const firstNodes = [];
  firstRound.matches.forEach((match, idx) => {
    const step = 360 / totalMatches;
    const baseAngle = idx * step;
    firstNodes.push({ angle: normalizeAngle(baseAngle - step * 0.2), match });
    firstNodes.push({ angle: normalizeAngle(baseAngle + step * 0.2), match });
  });
  nodesByRound.push(firstNodes);

  // ---------- 3. DESENHAR FASES SEGUINTES E CONECTORES ----------
  for (let ri = 1; ri < validRounds.length; ri++) {
    const round = validRounds[ri];
    const matches = round.matches;
    const radius = LEVEL_R[ri] || LEVEL_R[LEVEL_R.length - 1];
    const sizeIdx = Math.min(ri, NODE_SIZE.length - 1);
    const size = NODE_SIZE[sizeIdx];
    const prevNodes = nodesByRound[ri - 1];
    const totalPrev = prevNodes.length;

    // Cada match da fase atual consome 2 nós da fase anterior (por posição)
    const currentNodes = [];

    matches.forEach((match, idx) => {
      const parentIdx1 = idx * 2;
      const parentIdx2 = idx * 2 + 1;

      // Ângulos dos pais (fallback para TBD se não existir)
      let angleA, angleB;
      if (parentIdx1 < totalPrev) {
        angleA = prevNodes[parentIdx1].angle;
      } else {
        angleA = (totalPrev > 0) ? prevNodes[totalPrev - 1].angle : 0;
      }
      if (parentIdx2 < totalPrev) {
        angleB = prevNodes[parentIdx2].angle;
      } else {
        angleB = (totalPrev > 0) ? prevNodes[totalPrev - 1].angle + 10 : 10;
      }

      const childAngle = midAngle(angleA, angleB);

      // Determinar vencedor
      let winnerTeam = null;
      let decided = false;
      if (match.winnerId) {
        decided = true;
        winnerTeam = (match.home?.id === match.winnerId) ? match.home : match.away;
      } else if (match.status === 'FINISHED' && match.score) {
        const h = match.score?.home || 0;
        const a = match.score?.away || 0;
        if (h > a) { decided = true; winnerTeam = match.home; }
        else if (a > h) { decided = true; winnerTeam = match.away; }
        else if (match.score?.penalties) {
          const ph = match.score.penalties?.home || 0;
          const pa = match.score.penalties?.away || 0;
          if (ph > pa) { decided = true; winnerTeam = match.home; }
          else if (pa > ph) { decided = true; winnerTeam = match.away; }
        }
      }

      // Cor do ramo
      const branchIdx = decided ?
        (winnerTeam?.id === match.home?.id ? (prevNodes[parentIdx1]?.branchIdx || 0) : (prevNodes[parentIdx2]?.branchIdx || 0)) :
        (prevNodes[parentIdx1]?.branchIdx || 0);
      const color = decided ? BRANCH_COLORS[branchIdx] : GREY;

      // Desenhar conector
      const rMid = (LEVEL_R[ri-1] + LEVEL_R[ri]) / 2;
      const glowLevel = Math.min(ri, GLOW_AMOUNT.length - 1);
      const lineWidth = Math.min(ri + 1, 5);

      drawConnector(
        LEVEL_R[ri-1],
        angleA,
        angleB,
        rMid,
        childAngle,
        LEVEL_R[ri],
        color,
        glowLevel,
        lineWidth
      );

      // Criar nó do vencedor (ou TBD)
      const teamObj = winnerTeam || {
        name: 'TBD',
        logo: null,
        id: null,
        code: null,
        _matchData: {
          opponent: null,
          homeName: match.home?.name || '—',
          awayName: match.away?.name || '—',
          score: match.score ? `${match.score.home ?? '?'} × ${match.score.away ?? '?'}` : '—',
          stage: round.label || `Fase ${ri + 1}`,
          date: new Date(match.date).toLocaleDateString('pt-BR'),
          time: new Date(match.date).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
          status: match.status || 'SCHEDULED',
          isUpcoming: ['SCHEDULED', 'TIMED'].includes(match.status),
          isLive: ['IN_PLAY', 'LIVE', 'PAUSED'].includes(match.status),
          isFinished: match.status === 'FINISHED',
          statusLabel: STATUS_LABELS[match.status] || match.status || 'EM BREVE'
        }
      };
      if (winnerTeam) {
        teamObj._matchData.opponent = (match.home?.id === winnerTeam.id) ? match.away : match.home;
      }

      const isChampion = (ri === validRounds.length - 1) && decided && matches.length === 1;
      drawTeamNode(
        teamObj,
        LEVEL_R[ri],
        childAngle,
        decided ? BRANCH_COLORS[branchIdx] : GREY,
        !decided,
        size,
        decided ? glowLevel : 0,
        isChampion
      );

      // Guardar para próxima fase
      currentNodes.push({
        angle: childAngle,
        branchIdx: branchIdx,
        match: match,
        team: teamObj
      });
    });

    nodesByRound.push(currentNodes);
  }

  // ---------- 4. TAÇA NO CENTRO ----------
  const trophyG = el('g');
  trophyG.appendChild(el('circle', { cx: CX, cy: CY, r: 62, fill: '#0b0b0c', stroke: '#3a2c0c', 'stroke-width': 2 }));
  const trophySize = 76;
  trophyG.appendChild(el('image', {
    x: CX - trophySize/2,
    y: CY - trophySize/2,
    width: trophySize,
    height: trophySize,
    href: '/taca.gif',
    preserveAspectRatio: 'xMidYMid meet',
    style: 'filter: drop-shadow(0 0 30px rgba(217,165,49,0.4))'
  }));
  svg.appendChild(trophyG);

  // ---------- 5. ATUALIZAR UI ----------
  updateLivePanel(data);
  const ts = new Date(data.updatedAt).toLocaleString('pt-BR');
  statusEl.innerHTML = `Atualizado em ${ts} <button id="refreshBtn">↻ Atualizar</button>`;
  document.getElementById('refreshBtn')?.addEventListener('click', load);
}

// ---------- LOAD & POLLING ----------
async function load() {
  statusEl.textContent = 'Atualizando…';
  try {
    const res = await fetch('/api/bracket', { cache: 'no-store' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
    currentData = data;
    render(data);
  } catch (err) {
    svg.innerHTML = '';
    statusEl.innerHTML = `<div class="err">❌ ${err.message}</div>`;
  }
}

document.getElementById('refreshBtn')?.addEventListener('click', load);
load();
setInterval(load, 90000);
  </script>
