<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Copa do Mundo 2026 — Chave Oficial</title>
<style>
  :root {
    --bg: #0b0b0c;
    --panel: rgba(21, 21, 23, 0.6);
    --grey: #3c3c40;
    --gold: #d9a531;
    --text: #e9e6df;
    --muted: #8a8a8f;
    --glass: rgba(255, 255, 255, 0.05);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: var(--glass);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 12px 16px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  header p {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--muted);
  }

  #livePanel {
    max-width: 880px;
    margin: 12px auto;
    padding: 12px 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    font-size: 13px;
    transition: grid-template-columns 0.2s;
  }
  #livePanel.no-live {
    grid-template-columns: 1fr;
  }
  #livePanel.no-live .live-match {
    display: none;
  }
  #livePanel.no-live .next-match {
    justify-content: center;
  }
  #livePanel .live-match {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #livePanel .live-badge {
    color: #ff3b30;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.05em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #livePanel .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
  }
  #livePanel .match-teams img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .match-score {
    font-weight: 700;
    font-size: 18px;
    color: var(--gold);
    padding: 0 8px;
  }
  #livePanel .match-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .next-match {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  #livePanel .next-badge {
    color: var(--gold);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #livePanel .next-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #livePanel .next-info .teams {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #livePanel .next-info img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    border-radius: 50%;
  }
  #livePanel .next-info .date-time {
    color: var(--muted);
    font-size: 12px;
  }
  #livePanel .status-badge {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .status-live { background: #ff3b30; color: #fff; }
  .status-finished { background: #34c759; color: #fff; }
  .status-upcoming { background: #ff9500; color: #fff; }

  #wrap {
    width: min(94vw, 880px);
    margin: 0 auto;
    position: relative;
  }
  #stage {
    width: 100%;
    height: auto;
    display: block;
  }

  .node-img {
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.6));
  }
  .node-img.pending {
    opacity: 0.32;
  }
  .node-img.champion {
    animation: championGlow 2s ease-in-out infinite;
  }
  @keyframes championGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(217,165,49,0.6)); }
    50% { filter: drop-shadow(0 0 40px rgba(217,165,49,0.9)); }
  }

  .conf-badge {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.75));
    pointer-events: none;
  }

  .ring-label {
    fill: var(--muted);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tooltip-modern {
    position: fixed;
    pointer-events: none;
    background: rgba(20, 20, 23, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    min-width: 180px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .tooltip-modern.visible { opacity: 1; }
  .tooltip-modern.pinned { pointer-events: auto; }
  .tooltip-modern .tt-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .tooltip-modern .tt-header img {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 50%;
  }
  .tooltip-modern .tt-vs {
    color: var(--muted);
    font-weight: 400;
    padding: 0 4px;
  }
  .tooltip-modern .tt-score {
    color: var(--gold);
    font-weight: 700;
    font-size: 18px;
    margin: 4px 0;
  }
  .tooltip-modern .tt-details {
    color: var(--muted);
    font-size: 11px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .tooltip-modern .tt-details span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-close {
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    padding: 0 4px;
  }
  .tooltip-modern .tt-close:hover { color: var(--gold); }
  .tooltip-modern .tt-loading {
    color: var(--muted);
    font-size: 12px;
  }
  .tooltip-modern .tt-info-row {
    font-size: 12px;
    margin-top: 4px;
    line-height: 1.5;
  }
  .tooltip-modern .tt-info-row strong {
    color: var(--text);
  }
  .tooltip-modern .tt-scorer-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .tooltip-modern .tt-scorer-photo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid rgba(255,255,255,0.1);
    background: #1c1c1f;
    flex-shrink: 0;
  }
  .tooltip-modern .tt-upcoming {
    text-align: center;
  }
  .tooltip-modern .tt-upcoming .tt-badge {
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .tooltip-modern .tt-upcoming .tt-teams {
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
    margin: 8px 0;
    letter-spacing: 0.02em;
  }
  .tooltip-modern .tt-upcoming .tt-teams strong {
    color: var(--gold);
    font-weight: 700;
    padding: 0 6px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 6px 0 4px;
  }
  .tooltip-modern .tt-upcoming .tt-datetime span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tooltip-modern .tt-upcoming .tt-stage {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .tooltip-modern .tt-live-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #ff3b30;
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
    margin-right: 4px;
  }

  #status {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 10px 0 28px;
  }
  #status button {
    background: none;
    border: 1px solid var(--grey);
    color: var(--text);
    border-radius: 6px;
    padding: 4px 12px;
    margin-left: 8px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
  }
  #status button:hover { border-color: var(--gold); color: var(--gold); }
  .err {
    max-width: 560px;
    margin: 20px auto;
    padding: 14px 18px;
    border: 1px solid #5b2a2a;
    background: #1c1010;
    border-radius: 8px;
    font-size: 13px;
    color: #f3b7b7;
  }

  @media (max-width: 640px) {
    #livePanel {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 10px 14px;
      font-size: 12px;
    }
    #livePanel .next-match {
      justify-content: flex-start;
    }
    #livePanel .match-score {
      font-size: 16px;
    }
    .tooltip-modern {
      min-width: 150px;
      padding: 10px 12px;
    }
    .tooltip-modern .tt-upcoming .tt-teams {
      font-size: 15px;
    }
    .tooltip-modern .tt-upcoming .tt-datetime {
      font-size: 11px;
      gap: 8px;
    }
    .tooltip-modern .tt-header {
      font-size: 12px;
    }
    .tooltip-modern .tt-header img {
      width: 22px;
      height: 22px;
    }
    .tooltip-modern .tt-score {
      font-size: 16px;
    }
  }
</style>
</head>
<body>
  <header>
    <h1>🏆 FIFA World Cup 2026</h1>
    <p>Chave do mata-mata — atualizada automaticamente via API · clique numa seleção para ver último jogo e artilheiro</p>
  </header>

  <div id="livePanel">
    <div class="live-match">
      <span class="live-badge">● AO VIVO</span>
      <span class="match-teams" id="liveTeams">
        <img src="" alt=""> <span id="liveHome">—</span>
        <span class="match-score" id="liveScore">vs</span>
        <span id="liveAway">—</span> <img src="" alt="">
      </span>
      <span class="match-time" id="liveTime"></span>
      <span class="status-badge status-live" id="liveStatus">AO VIVO</span>
    </div>
    <div class="next-match">
      <span class="next-badge">⏰ PRÓXIMO</span>
      <div class="next-info">
        <span class="teams" id="nextTeams">
          <img src="" alt=""> <span id="nextHome">—</span>
          <span style="color:var(--muted)">vs</span>
          <span id="nextAway">—</span> <img src="" alt="">
        </span>
        <span class="date-time" id="nextDateTime">📅 --/-- • 🕘 --:--</span>
      </div>
    </div>
  </div>

  <div id="wrap">
    <svg id="stage" viewBox="0 0 1000 1000"></svg>
    <div class="tooltip-modern" id="tooltip"></div>
  </div>

  <div id="status">
    Carregando…
    <button id="refreshBtn">Atualizar agora</button>
  </div>

   <script type="module">
  // ============================================================
  //  BRACKET CIRCULAR – PROFISSIONAL (com nextMatchId + nextSlot)
  //  ✅ backend já entrega rounds com nextMatchId e nextSlot
  //  ✅ front usa esses links para propagar vencedores e conectar
  //  ✅ distribuição angular uniforme (radianos)
  //  ✅ defs único
  // ============================================================

  const NS = "http://www.w3.org/2000/svg";
  const CX = 500, CY = 500;
  const POLL_MS = 90_000;

  const LEVEL_R = [460, 400, 338, 276, 214, 130];
  const BRANCH_COLORS = [
    "#e6484f", "#3ddc84", "#f0c23d", "#4ea1f7",
    "#b768e0", "#ff9f53", "#2ec4b6", "#ff6f91",
  ];
  const GREY = "#3c3c40";
  const NODE_SIZE = 30;

  const svg = document.getElementById("stage");
  const statusEl = document.getElementById("status");
  const tip = document.getElementById("tip");

  function el(tag, attrs) {
    const n = document.createElementNS(NS, tag);
    for (const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }

  function polar(r, angleRad) {
    const x = CX + r * Math.sin(angleRad);
    const y = CY - r * Math.cos(angleRad);
    return [x, y];
  }

  function clear(node) {
    while (node.lastChild) node.removeChild(node.lastChild);
  }

  function getDefs() {
    let defs = document.getElementById("defs");
    if (!defs) {
      defs = el("defs", { id: "defs" });
      svg.prepend(defs);
    }
    return defs;
  }

  function drawBackground() {
    const defs = getDefs();
    if (!document.getElementById("bgGlow")) {
      const grad = el("radialGradient", { id: "bgGlow", cx: "50%", cy: "50%", r: "55%" });
      grad.appendChild(el("stop", { offset: "0%", "stop-color": "#3a2c0c" }));
      grad.appendChild(el("stop", { offset: "55%", "stop-color": "#15120a" }));
      grad.appendChild(el("stop", { offset: "100%", "stop-color": "#0b0b0c" }));
      defs.appendChild(grad);
    }
    svg.appendChild(el("rect", { x: 0, y: 0, width: 1000, height: 1000, fill: "url(#bgGlow)" }));
    LEVEL_R.forEach((r) => {
      svg.appendChild(
        el("circle", { cx: CX, cy: CY, r, fill: "none", stroke: "#222226", "stroke-width": 1 })
      );
    });
  }

  function drawTrophy() {
    const g = el("g", {});
    g.appendChild(el("circle", { cx: CX, cy: CY, r: 56, fill: "#0b0b0c", stroke: "#3a2c0c", "stroke-width": 2 }));
    const t = el("text", { x: CX, y: CY + 8, "text-anchor": "middle", "font-size": 40, fill: "#d9a531" });
    t.textContent = "🏆";
    g.appendChild(t);
    svg.appendChild(g);
  }

  function drawConnector(r1, angleA, r2, angleB, rMid, childAngle, rChild, color) {
    const g = el("g", { fill: "none", stroke: color, "stroke-width": 2, "stroke-linecap": "round" });
    const [x1, y1] = polar(r1, angleA);
    const [mx1, my1] = polar(rMid, angleA);
    const [x2, y2] = polar(r2, angleB);
    const [mx2, my2] = polar(rMid, angleB);
    const [cmx, cmy] = polar(rMid, childAngle);
    const [cx2, cy2] = polar(rChild, childAngle);

    g.appendChild(el("path", { d: `M${x1},${y1} L${mx1},${my1}` }));
    g.appendChild(el("path", { d: `M${x2},${y2} L${mx2},${my2}` }));
    const diff = angleB - angleA;
    const large = Math.abs(diff) > Math.PI ? 1 : 0;
    g.appendChild(el("path", { d: `M${mx1},${my1} A${rMid},${rMid} 0 ${large} 1 ${mx2},${my2}` }));
    g.appendChild(el("path", { d: `M${cmx},${cmy} L${cx2},${cy2}` }));
    svg.appendChild(g);
  }

  function drawTeamNode(team, r, angleRad, branchColor, pending) {
    const [x, y] = polar(r, angleRad);
    const size = NODE_SIZE;
    const g = el("g", { class: "node", "data-x": x, "data-y": y });

    const defs = getDefs();
    const clipId = `clip-${team?.id || Math.random().toString(36).slice(2)}`;
    let clip = document.getElementById(clipId);
    if (!clip) {
      clip = el("clipPath", { id: clipId });
      clip.appendChild(el("circle", { cx: x, cy: y, r: size / 2 }));
      defs.appendChild(clip);
    }

    g.appendChild(
      el("circle", { cx: x, cy: y, r: size / 2 + 2, fill: "#101012", stroke: pending ? GREY : branchColor, "stroke-width": 2 })
    );

    if (team && team.logo) {
      const img = el("image", {
        x: x - size / 2, y: y - size / 2, width: size, height: size,
        href: team.logo,
        "clip-path": `url(#${clipId})`,
        class: "node-img" + (pending ? " pending" : ""),
        preserveAspectRatio: "xMidYMid slice",
      });
      g.appendChild(img);
    } else {
      g.appendChild(el("circle", { cx: x, cy: y, r: size / 2 - 4, fill: "#222226" }));
    }

    if (team && team.name) {
      g.addEventListener("mousemove", (ev) => {
        tip.textContent = team.name;
        tip.style.left = ev.clientX + "px";
        tip.style.top = ev.clientY + "px";
        tip.style.opacity = 1;
      });
      g.addEventListener("mouseleave", () => (tip.style.opacity = 0));
    }

    svg.appendChild(g);
  }

  // ---------- PROPAGAÇÃO DE VENCEDORES USANDO nextMatchId ----------
  function propagateWinners(rounds) {
    // Construir mapa de matches por ID
    const matchMap = new Map();
    rounds.forEach(round => {
      round.matches.forEach(match => {
        const id = match.fixtureId || match.id;
        if (id) matchMap.set(id, match);
      });
    });

    // Para cada match, verificar se tem vencedor e propagar para o próximo
    rounds.forEach(round => {
      round.matches.forEach(match => {
        let winner = null;
        if (match.winnerId != null) {
          winner = (match.home?.id === match.winnerId) ? match.home : match.away;
        } else if (match.status === "FINISHED" && match.score) {
          const h = match.score?.home ?? 0;
          const a = match.score?.away ?? 0;
          if (h > a) winner = match.home;
          else if (a > h) winner = match.away;
          else if (match.score?.penalties) {
            const ph = match.score.penalties?.home ?? 0;
            const pa = match.score.penalties?.away ?? 0;
            if (ph > pa) winner = match.home;
            else if (pa > ph) winner = match.away;
          }
        }

        if (!winner) return;
        if (!match.nextMatchId) return;

        const nextMatch = matchMap.get(match.nextMatchId);
        if (!nextMatch) return;

        if (match.nextSlot === "home") {
          nextMatch.home = winner;
        } else if (match.nextSlot === "away") {
          nextMatch.away = winner;
        }
      });
    });
  }

  // ---------- RENDER PRINCIPAL ----------
  function render(data) {
    const defs = document.getElementById("defs");
    clear(svg);
    if (defs) svg.appendChild(defs);

    drawBackground();

    // Propagar vencedores usando nextMatchId
    propagateWinners(data.rounds);

    // --- Obter folhas (primeira fase) ---
    const leaves = data.leaves || [];
    const N = leaves.length;
    if (N === 0) {
      statusEl.innerHTML = "Nenhum time encontrado para a primeira fase.";
      return;
    }

    // --- Renderizar folhas ---
    let previousNodes = leaves.map((team, i) => {
      const angleRad = (i / N) * 2 * Math.PI - Math.PI / 2;
      const branchSize = N / 8;
      const branchIdx = Math.floor(i / branchSize) % 8;
      drawTeamNode(team, LEVEL_R[0], angleRad, BRANCH_COLORS[branchIdx], false);
      return { team, angle: angleRad, branchIdx, decided: true };
    });

    // --- Renderizar rounds seguintes (usando nextMatchId para encontrar pais) ---
    const rounds = data.rounds || [];
    let level = 0;

    for (let ri = 0; ri < rounds.length; ri++) {
      const round = rounds[ri];
      const matches = round.matches || [];
      const r1 = LEVEL_R[level];
      const r2 = LEVEL_R[level + 1];
      const rMid = (r1 + r2) / 2;

      const currentNodes = [];

      for (let i = 0; i < matches.length; i++) {
        const match = matches[i];
        // Encontrar os pais pelos IDs dos times
        const homeParent = previousNodes.find(n => n.team?.id === match.home?.id);
        const awayParent = previousNodes.find(n => n.team?.id === match.away?.id);

        if (!homeParent || !awayParent) continue;

        // Ângulo do filho (média dos ângulos dos pais, com ajuste de wrap)
        let childAngle = (homeParent.angle + awayParent.angle) / 2;
        let diff = awayParent.angle - homeParent.angle;
        if (diff > Math.PI) diff -= 2 * Math.PI;
        if (diff < -Math.PI) diff += 2 * Math.PI;
        childAngle = homeParent.angle + diff / 2;

        // Determinar vencedor (já propagado, mas recalcular para segurança)
        let winnerTeam = null;
        let decided = false;
        if (match.winnerId != null) {
          decided = true;
          winnerTeam = (match.home?.id === match.winnerId) ? match.home : match.away;
        } else if (match.status === "FINISHED" && match.score) {
          const h = match.score?.home ?? 0;
          const a = match.score?.away ?? 0;
          if (h > a) { decided = true; winnerTeam = match.home; }
          else if (a > h) { decided = true; winnerTeam = match.away; }
          else if (match.score?.penalties) {
            const ph = match.score.penalties?.home ?? 0;
            const pa = match.score.penalties?.away ?? 0;
            if (ph > pa) { decided = true; winnerTeam = match.home; }
            else if (pa > ph) { decided = true; winnerTeam = match.away; }
          }
        }

        const winnerIsHome = decided && winnerTeam && winnerTeam.id === match.home?.id;
        const branchIdx = decided
          ? (winnerIsHome ? homeParent.branchIdx : awayParent.branchIdx)
          : homeParent.branchIdx;
        const color = decided ? BRANCH_COLORS[branchIdx] : GREY;

        // Desenhar conector (sempre, mesmo se não decidido, para mostrar estrutura)
        drawConnector(r1, homeParent.angle, r1, awayParent.angle, rMid, childAngle, r2, color);

        // Criar nó do vencedor (ou TBD)
        const teamObj = winnerTeam || {
          name: `TBD`,
          logo: null,
          id: null,
          code: null,
        };
        drawTeamNode(teamObj, r2, childAngle, decided ? BRANCH_COLORS[branchIdx] : GREY, !decided);

        currentNodes.push({
          team: teamObj,
          angle: childAngle,
          branchIdx: branchIdx,
          decided: decided,
        });
      }

      previousNodes = currentNodes;
      level += 1;
      if (currentNodes.length === 0) break;
    }

    drawTrophy();

    const ts = new Date(data.updatedAt).toLocaleString("pt-BR");
    statusEl.innerHTML = `Atualizado em ${ts} <button id="refreshBtn">Atualizar agora</button>`;
    document.getElementById("refreshBtn").addEventListener("click", load);
  }

  // ---------- LOAD E POLLING ----------
  async function load() {
    statusEl.textContent = "Atualizando…";
    try {
      const res = await fetch("/api/bracket", { cache: "no-store" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Erro desconhecido");
      render(data);
    } catch (err) {
      svg.innerHTML = "";
      statusEl.innerHTML = `<div class="err">Não foi possível carregar o bracket: ${String(err.message || err)}</div>`;
    }
  }

  document.getElementById("refreshBtn").addEventListener("click", load);
  load();
  setInterval(load, POLL_MS);
     
  </script>
</body>
</html>
