<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa 2026 – Bracket Circular</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- SVG LAYER (bracket) -->
    <svg id="bracket-layer" viewBox="0 0 1200 1000"></svg>

    <!-- UI LAYER (tooltip, status, etc.) -->
    <div id="ui-layer">
      <div id="tooltip"></div>
    </div>

    <div id="status">
      <span id="statusText">Carregando…</span>
      <button id="refreshBtn">↻ Atualizar</button>
    </div>
  </div>

  <script type="module">
const NS = 'http://www.w3.org/2000/svg';

const svgLayer = document.getElementById('bracket-layer');
const tooltipEl = document.getElementById('tooltip');
const statusText = document.getElementById('statusText');
const refreshBtn = document.getElementById('refreshBtn');

const state = {
  rounds: [],
  leaves: [],
  hover: null,
  updatedAt: null,
};

// ======================
// CONFIG
// ======================
const CX = 600;
const CY = 500;
const LEVEL_R = [420, 360, 300, 240, 180, 120];

// ======================
// SAFE HELPERS
// ======================
const safeArr = v => Array.isArray(v) ? v : [];
const safeNum = v => isFinite(v) ? v : 0;

function el(tag, attrs = {}) {
  const n = document.createElementNS(NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

// ======================
// POSITION
// ======================
function polar(r, a) {
  const x = CX + r * Math.sin(a);
  const y = CY - r * Math.cos(a);
  return [x, y];
}

// ======================
// MATCH INDEX (ÚNICO CORRETO)
// ======================
const matchMap = new Map();

function indexMatches(rounds) {
  matchMap.clear();
  rounds.forEach(r => {
    r.matches.forEach(m => {
      matchMap.set(m.fixtureId, m);
    });
  });
}

// pega pais via reverse lookup do nextMatchId
function getParents(matchId) {
  const parents = [];

  for (const m of matchMap.values()) {
    if (m.nextMatchId === matchId) {
      parents.push(m);
    }
  }

  return parents;
}

// ======================
// SVG CLEAN
// ======================
function clear() {
  while (svgLayer.firstChild) svgLayer.removeChild(svgLayer.firstChild);
}

// ======================
// NODE
// ======================
function drawNode(team, r, a, color, pending, matchId) {
  if (!isFinite(a)) return;

  const [x, y] = polar(r, a);
  if (!isFinite(x) || !isFinite(y)) return;

  const g = el('g');
  g.dataset.id = matchId || '';

  g.appendChild(el('circle', {
    cx: x,
    cy: y,
    r: 16,
    fill: pending ? '#222' : color,
    stroke: '#000',
    'stroke-width': 2
  }));

  const text = el('text', {
    x,
    y: y + 4,
    'text-anchor': 'middle',
    'font-size': 10,
    fill: '#fff'
  });

  text.textContent = team?.code || 'TBD';
  g.appendChild(text);

  g.addEventListener('mouseenter', () => {
    state.hover = { matchId, x, y };
    renderUI();
  });

  g.addEventListener('mouseleave', () => {
    state.hover = null;
    renderUI();
  });

  svgLayer.appendChild(g);
}

// ======================
// CONNECTION
// ======================
function connect(a, b, color) {
  if (!isFinite(a.x) || !isFinite(b.x)) return;

  const path = el('path', {
    d: `M${a.x},${a.y} Q${(a.x+b.x)/2},${(a.y+b.y)/2} ${b.x},${b.y}`,
    stroke: color,
    fill: 'none'
  });

  svgLayer.appendChild(path);
}

// ======================
// RENDER
// ======================
function render() {
  clear();

  const rounds = safeArr(state.rounds);
  if (!rounds.length) return;

  indexMatches(rounds);

  const leaves = safeArr(state.leaves);
  const baseN = leaves.length || 1;

  // ROUND 0
  const nodes = leaves.map((t, i) => {
    const a = (i / baseN) * Math.PI * 2 - Math.PI/2;
    drawNode(t, LEVEL_R[0], a, '#555', false, null);
    return { team: t, angle: a };
  });

  let prev = nodes;

  for (let r = 0; r < rounds.length; r++) {
    const matches = safeArr(rounds[r].matches);

    const next = [];

    for (let i = 0; i < matches.length; i++) {
      const m = matches[i];

      const parents = getParents(m.fixtureId);

      const home = parents[0];
      const away = parents[1];

      if (!home || !away) continue;

      const a = (home.angle + away.angle) / 2;

      const winner =
        m.winnerId === m.home?.id ? m.home :
        m.winnerId === m.away?.id ? m.away :
        null;

      const color = winner ? '#4ade80' : '#555';

      connect(
        { x: CX + Math.cos(home.angle)*LEVEL_R[r], y: CY - Math.sin(home.angle)*LEVEL_R[r] },
        { x: CX + Math.cos(away.angle)*LEVEL_R[r], y: CY - Math.sin(away.angle)*LEVEL_R[r] },
        color
      );

      drawNode(
        winner || { code: 'TBD' },
        LEVEL_R[r+1],
        a,
        color,
        !winner,
        m.fixtureId
      );

      next.push({ angle: a, team: winner || null });
    }

    prev = next;
  }
}

// ======================
// UI SAFE
// ======================
function renderUI() {
  if (!tooltipEl) return;

  if (!state.hover) {
    tooltipEl.style.opacity = 0;
    return;
  }

  tooltipEl.style.opacity = 1;
  tooltipEl.style.transform =
    `translate3d(${state.hover.x+10}px,${state.hover.y+10}px,0)`;
}

// ======================
// LOAD
// ======================
async function load() {
  const res = await fetch('/api/bracket');
  const data = await res.json();

  state.rounds = data.rounds || [];
  state.leaves = data.leaves || [];
  state.updatedAt = data.updatedAt;

  render();
  renderUI();
}

// ======================
// START
// ======================
refreshBtn.onclick = load;
load();
setInterval(load, 90000);
</script>
</body>
</html>
